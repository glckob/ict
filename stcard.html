<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <title>កាតសិស្ស</title>
  <style>
    body {
      font-family: 'Noto Sans Khmer', sans-serif;
      background: #ffffff;
      padding: 10px;
      margin: 0;
    }

    .controls {
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
    }

    select, input[type="text"], button, input[type="date"], textarea {
      padding: 8px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 2mm;
      justify-content: center;
    }

    .card {
      width: 6.5cm;
      height: 9.5cm;
      background: white;
      border: 1px solid #000;
      border-radius: 8px;
      padding: 6px;
      font-size: 11px;
      position: relative;
      overflow: hidden;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-sizing: border-box;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background-repeat: no-repeat;
      background-position: center;
      background-size: 75%;
      opacity: 0.20;
      z-index: 0;
    }

    .card * {
      position: relative;
      z-index: 1;
    }

    .school-name {
      font-family: 'Moul', cursive;
      font-size: 18px;
      color: #0000cc;
      margin-bottom: 4px;
    }

    .student-name {
      font-family: 'Moul', cursive;
      font-size: 14px;
      color: #000000;
      margin: 4px 0;
    }

    .info-and-qr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      padding: 0 2px;
    }

    .info {
      text-align: left;
      font-size: 12px;
      line-height: 1.6;
      flex-grow: 1;
    }

    .info b {
      display: inline-block;
      width: 75px;
    }

    .qr {
      width: 70px;
      height: 70px;
      margin-top: 0;
      margin-left: 10px;
    }

    .photo-wrapper {
      position: relative;
      width: 95px;
      height: 120px;
      margin: 4px auto 4px 15px;
    }

    .photo {
      width: 100%;
      height: 100%;
      border-radius: 0%;
      object-fit: cover;
      object-position: top center;
      border: 1px solid #000;
    }

    .stamp {
      position: absolute;
      top: 50%;
      left: +170%;
      width: 140px;
      height: 140px;
      transform: translate(-50%, -50%);
      opacity: 1.0;
      z-index: 2;
      background-color: transparent;
    }

    #loading {
      text-align: center;
      font-size: 18px;
      padding: 20px;
      color: #555;
    }

    @media print {
      @page {
        size: A4 portrait;
        margin-top: 10mm;
        margin-bottom: 4mm;
        margin-left: 5mm;
        margin-right: 5mm;
      }

      html, body {
        width: 210mm;
        height: 297mm;
        margin: 0;
        padding: 0;
      }

      .controls, #loading {
        display: none;
      }

      .card {
        page-break-inside: avoid;
      }
    }
    
    .home-btn {
      background: #10b981; color: #ffffff; border: 1px solid #059669;
      padding: 8px 14px; border-radius: 9999px; font-weight: 700; cursor: pointer;
      text-decoration: none; box-shadow: 0 4px 20px rgba(0,0,0,.06);
      transition: box-shadow .2s, transform .05s, background .2s;
      display: flex; align-items: center; gap: 6px; height: fit-content;
    }
    .home-btn:hover { box-shadow: 0 8px 28px rgba(0,0,0,.12); }
    .home-btn:active { transform: translateY(1px); background:#059669; }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;600;700&family=Moul&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>
  <div class="controls" id="appControls" style="display: none;">
    <a href="teacher.html" class="home-btn"><i class="fas fa-home" aria-hidden="true"></i> ទំព័រដើមគ្រូ</a>
    
    <label for="cardIssueDate" style="font-size: 14px; font-weight: 500;">ថ្ងៃចេញប័ណ្ណ:</label>
    <input type="date" id="cardIssueDate">

    <select id="classFilter">
      <option value="">ថ្នាក់ទាំងអស់</option>
    </select>
    
    <p id="class-summary" style="min-height: 1.25em; margin: 0 10px; font-size: 14px; color: #4b5563; font-weight: 600;">&nbsp;</p>

    <input type="text" id="searchBox" placeholder="ស្វែងរកតាមឈ្មោះ ឬអត្តលេខ" />
    <button onclick="window.print()">🖨️ បោះពុម្ព / រក្សាទុក PDF</button>
    
    <textarea id="manualIdsInput" rows="2" placeholder="វាយអត្តលេខសិស្ស ចែកដោយសញ្ញា (, ) ឬបន្តបន្ទាត់ (មិនកំណត់)" style="min-width: 320px; font-family: inherit;"></textarea>
    <button id="applyManualIdsBtn" type="button">អនុវត្ត ID ដោយដៃ</button>
    <button id="clearManualIdsBtn" type="button">ជម្រះ</button>
    <span id="manualIdsStatus" style="font-size: 12px; color: #2563eb; font-weight: bold;"></span>

    <p style="color: red; text-align: center; width: 100%; flex-basis: 100%; font-weight: bold;">
      🖨️ ដើម្បីបោះពុម្ព Logo អោយចេញ សូមចុច "More Settings" ក្នុងផ្ទាំង Print ហើយ ✓ យក "Background graphics"
    </p>
  </div>

  <div id="loading">🔄 កំពុងភ្ជាប់ទៅកាន់ Firebase...</div>
  <div id="container" class="container" style="display: none;"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, query, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- Firebase Setup ---
    let app, auth, db, appId;
    try {
      const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
        apiKey: "AIzaSyD1l6lkUCMkOPPE-gR3a8XardlGUUfR3pg",
        authDomain: "ictexam-1ebeb.firebaseapp.com",
        projectId: "ictexam-1ebeb",
        storageBucket: "ictexam-1ebeb.firebasestorage.app",
        messagingSenderId: "18694490334",
        appId: "1:18694490334:web:c5071b02bf72100a78da4f"
      };

      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      appId = typeof __app_id !== 'undefined' ? __app_id : 'ictexam-app'; 
    } catch (error) { console.error("Firebase init error:", error); }

    let allData = [];
    let manualIds = [];
    let settingsData = {
        schoolName: 'វិទ្យាល័យកូប',
        cardBgUrl: 'https://i.imgur.com/s46369v.png',
        sealImageUrl: ''
    };

    async function initApp() {
        document.getElementById('loading').style.display = 'block';
        
        // អនុញ្ញាតឲ្យចូលប្រើបានតែពេលដែលគ្រូបាន Login រួច
        onAuthStateChanged(auth, (user) => {
            if (user && !user.isAnonymous) {
                document.getElementById('appControls').style.display = 'flex';
                loadGlobalSettings();
                loadStudentsFromFirebase();
            } else {
                document.getElementById('loading').innerHTML = `
                    <div style="color: #e11d48; padding: 30px; background: #fff1f2; border-radius: 12px; border: 1px solid #fda4af; margin: 20px auto; max-width: 400px; font-family: 'Noto Sans Khmer', sans-serif;">
                        <i class="fas fa-lock fa-3x mb-4"></i><br>
                        <b style="font-size: 18px;">មិនមានសិទ្ធិចូលប្រើប្រាស់ទេ!</b><br><br>
                        សូមចូលគណនី (Login) ក្នុងប្រព័ន្ធគ្រូបង្រៀនជាមុនសិន ទើបអាចមើលកាតសិស្សបាន។
                    </div>
                `;
            }
        });
    }

    function loadGlobalSettings() {
        const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
        onSnapshot(settingsRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                settingsData.cardBgUrl = data.cardBgUrl || settingsData.cardBgUrl;
                settingsData.sealImageUrl = data.sealImageUrl || settingsData.sealImageUrl;
                updateCardBackground();
                if (allData.length > 0) filterAndDisplay(); 
            }
        });
    }

    function loadStudentsFromFirebase() {
        const sCollection = collection(db, 'artifacts', appId, 'public', 'data', 'students');
        onSnapshot(query(sCollection), (snapshot) => {
            allData = snapshot.docs.map(doc => doc.data());
            
            populateFilters(allData);
            updateCardBackground();
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('container').style.display = 'flex';
            
            const classFilter = document.getElementById("classFilter");
            if (classFilter && classFilter.value === "") {
                document.getElementById('container').innerHTML = '<p style="text-align: center; width: 100%; padding: 40px; color: #666; font-size: 16px;">សូមជ្រើសរើសថ្នាក់ដើម្បីបង្ហាញកាតសិស្ស</p>';
                const summaryEl = document.getElementById("class-summary");
                if(summaryEl) summaryEl.innerHTML = '&nbsp;';
            } else {
                filterAndDisplay();
            }
        }, (error) => {
            console.error("Error loading students:", error);
            document.getElementById('loading').innerHTML = '❌ មានបញ្ហាក្នុងការទាញយកទិន្នន័យ';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('container').style.display = 'none';
        });
    }

    function customSortClasses(a, b) {
        const regex = /^(\d+)([A-Z]?)?.*$/i;
        const matchA = a.match(regex);
        const matchB = b.match(regex);

        if (matchA && matchB) {
            const numA = parseInt(matchA[1], 10);
            const charA = (matchA[2] || '').toUpperCase();
            const numB = parseInt(matchB[1], 10);
            const charB = (matchB[2] || '').toUpperCase();

            if (numA !== numB) return numA - numB;
            return charA.localeCompare(charB);
        }
        return a.localeCompare(b);
    }

    function populateFilters(data) {
      if (data.length === 0) return;
      const classSet = new Set();
      data.forEach(std => { if (std.CLASS) classSet.add(std.CLASS.trim()); });

      const classFilter = document.getElementById("classFilter");
      const currentValue = classFilter.value;
      
      classFilter.innerHTML = '<option value="">----ជ្រើសរើសថ្នាក់----</option><option value="all">ថ្នាក់ទាំងអស់</option>';
      const sortedClasses = [...classSet].sort(customSortClasses);
      sortedClasses.forEach(cls => { classFilter.innerHTML += `<option value="${cls}">${cls}</option>`; });

      if (currentValue && [...classSet, 'all'].includes(currentValue)) classFilter.value = currentValue;
      else classFilter.value = "";

      classFilter.onchange = filterAndDisplay;
      document.getElementById("searchBox").oninput = filterAndDisplay;
      document.getElementById("cardIssueDate").onchange = filterAndDisplay;
    }

    function updateCardBackground() {
      let styleElement = document.getElementById('dynamic-card-style');
      if (!styleElement) {
        styleElement = document.createElement('style');
        styleElement.id = 'dynamic-card-style';
        document.head.appendChild(styleElement);
      }
      styleElement.innerHTML = `.card::before { background-image: url('${settingsData.cardBgUrl}'); }`;
    }

    function normalizeId(v) { return (v === null || v === undefined) ? '' : String(v).trim().toUpperCase(); }

    function parseManualIdsInput(raw) {
      if (!raw) return [];
      const parts = raw.split(/[\n,]+/).map(s => normalizeId(s)).filter(Boolean);
      const seen = new Set(), unique = [];
      for (const p of parts) { if (!seen.has(p)) { seen.add(p); unique.push(p); } }
      return unique;
    }

    function updateManualIdsStatus() {
      const el = document.getElementById('manualIdsStatus');
      if (!el) return;
      if (manualIds.length > 0) el.textContent = `ជ្រើសរើសដោយដៃ: ${manualIds.length} ID`; else el.textContent = '';
    }

    window.applyManualIds = () => {
      manualIds = parseManualIdsInput(document.getElementById('manualIdsInput')?.value || '');
      updateManualIdsStatus(); filterAndDisplay();
    };

    window.clearManualIds = () => {
      manualIds = [];
      const input = document.getElementById('manualIdsInput'); if (input) input.value = '';
      updateManualIdsStatus(); filterAndDisplay();
    };

    function filterAndDisplay() {
      if (allData.length === 0) return;
      const summaryEl = document.getElementById("class-summary");

      if (manualIds.length > 0) {
        const selected = allData.filter(std => manualIds.includes(normalizeId(std.ID)));
        if (summaryEl) summaryEl.textContent = `| ជ្រើសរើសដោយដៃ: ${selected.length} នាក់`;
        displayCards(selected); return;
      }
      
      const cls = document.getElementById("classFilter").value;
      const keyword = document.getElementById("searchBox").value.toLowerCase();

      if (cls === "") {
        if(summaryEl) summaryEl.innerHTML = '&nbsp;';
        displayCards([]); return;
      }

      const studentsForSummary = (cls === "all") ? allData : allData.filter(std => std.CLASS === cls);
      const totalStudents = studentsForSummary.length;
      const femaleStudents = studentsForSummary.filter(std => std.GEN === 'F' || std.GEN === 'ស្រី').length;
      if(summaryEl) summaryEl.textContent = `| សរុប: ${totalStudents} នាក់ (ស្រី: ${femaleStudents} នាក់)`;

      const filtered = studentsForSummary.filter(std => {
        const fullName = `${std.LNAME || ''} ${std.FNAME || ''}`.toLowerCase();
        return !keyword || fullName.includes(keyword) || (std.ID || '').toLowerCase().includes(keyword);
      });

      displayCards(filtered);
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      if (dateStr.includes('-')) {
        const parts = dateStr.split("-");
        if (parts.length === 3) {
            if (parts[0].length === 4) return `${parts[2]}-${parts[1]}-${parts[0]}`; 
            else if (parts[2].length === 4) return dateStr;
        }
      }
      return dateStr; 
    }

    function displayCards(data) {
      const container = document.getElementById("container");
      if (!container) return;

      container.style.display = "flex"; container.innerHTML = "";
      const issueDateValue = document.getElementById('cardIssueDate')?.value;
      let formattedDate = issueDateValue ? formatDate(issueDateValue) : '';

      if (data.length === 0) {
        container.innerHTML = `<p style="text-align: center; width: 100%; padding: 20px; color: #666;">រកមិនឃើញទិន្នន័យសិស្សទេ។</p>`;
        return;
      }

      data.forEach(std => {
        if (!std || typeof std !== 'object' || !std.ID) return;

        const div = document.createElement("div"); div.className = "card";
        const qrId = `qr-${std.ID}`, barcodeId = `barcode-${std.ID}`;
        
        const fullName = `${std.LNAME || ''} ${std.FNAME || ''}`.trim(), studentClass = std.CLASS || '', studentId = std.ID || '', dob = std.YYYY || '', gender = std.GEN || '', academicYear = std.YEAR || settingsData.academicYear || 'មិនកំណត់';
        const displayName = (gender === 'F' || gender === 'ស្រី') ? `ក. ${fullName}` : fullName;
        const photoUrl = std.PhotoURL ? std.PhotoURL.split(',')[0].trim() : null;

        const photoElement = photoUrl 
            ? `<img class="photo" src="${photoUrl}" alt="Photo" onerror="this.onerror=null;this.src='https://placehold.co/108x108/e2e8f0/7d7d7d?text=No+Photo';"/>`
            : `<div class="photo" style="background-color: transparent; border: 1px solid #000; display: flex; align-items:center; justify-content:center; color:#ccc;"><i class="fas fa-user fa-3x"></i></div>`;

        div.innerHTML = `
          <div>
            <div class="school-name">${settingsData.schoolName}</div>
            <div class="student-name">${displayName}</div>
            <div class="info-and-qr">
              <div class="info">
                <div><b>អត្តលេខ:</b> ${studentId}</div>
                <div><b>ថ្នាក់:</b> ${studentClass}</div>
                <div><b>ឆ្នាំសិក្សា:</b> ${academicYear}</div>
                <div><b>ភេទ:</b> ${gender}</div>
                <div><b>ឆ្នាំកំណើត:</b> ${dob}</div>
              </div>
              <div id="${qrId}" class="qr"></div>
            </div>
          </div>
          <div class="barcode-container" style="padding: 0 5px; margin-top: 5px;">
             <svg id="${barcodeId}" style="width: 100%; height: auto;"></svg>
          </div>
          <div class="issue-date" style="font-size: 10px; margin-top: 3px; font-weight: 500;">
            ${formattedDate ? `ថ្ងៃចេញប័ណ្ណ: ${formattedDate}` : ''}
          </div>
          <div class="photo-wrapper">
            ${photoElement}
            ${settingsData.sealImageUrl ? `<img class="stamp" src="${settingsData.sealImageUrl}" alt="Stamp" />` : ''}
          </div>
        `;
        container.appendChild(div);
      });

      setTimeout(() => {
        data.forEach(std => {
          if (!std || typeof std !== 'object' || !std.ID) return;
          const qrId = `qr-${std.ID}`, barcodeId = `barcode-${std.ID}`, studentId = std.ID;
          if (studentId && window.QRCode) {
            const qrElement = document.getElementById(qrId);
            if (qrElement) { qrElement.innerHTML = ''; try { new QRCode(qrElement, { text: studentId, width: 70, height: 70, correctLevel: QRCode.CorrectLevel.H }); } catch(e) {} }
          }
          if (studentId && window.JsBarcode) {
            try {
              const barcodeElement = document.getElementById(barcodeId);
              if (barcodeElement) JsBarcode(`#${barcodeId}`, studentId, { format: "CODE128", height: 30, width: 1.8, displayValue: false, margin: 0 });
            } catch (e) {
              const barcodeElement = document.getElementById(barcodeId);
              if(barcodeElement) barcodeElement.closest('.barcode-container')?.remove();
            }
          }
        });
      }, 100);
    }

    window.addEventListener('load', () => {
      try {
        const dateInput = document.getElementById('cardIssueDate');
        if (dateInput) dateInput.value = new Date().toISOString().split('T')[0];
      } catch (e) {}

      const applyBtn = document.getElementById('applyManualIdsBtn');
      const clearBtn = document.getElementById('clearManualIdsBtn');
      if (applyBtn) applyBtn.addEventListener('click', window.applyManualIds);
      if (clearBtn) clearBtn.addEventListener('click', window.clearManualIds);

      initApp();
    });
  </script>
</body>
</html>
