<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ប្រព័ន្ធគ្រូបង្រៀន - វិទ្យាល័យកូប</title>
  
  <link rel="icon" href="https://www.dropbox.com/scl/fi/2tds3u7hcslgrtcnfimdg/nv.ico?rlkey=t4swsdf8hv7iwbg23pjknp0wn&st=84qf47bv&dl=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;600;700&family=Moul&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <script src="https://unpkg.com/d3@3/d3.min.js"></script>
  <script src="https://unpkg.com/function-plot@1/dist/function-plot.js"></script>

  <style>
    body { font-family: 'Noto Sans Khmer', sans-serif; }
    .font-moul { font-family: 'Moul', cursive; font-weight: normal; line-height: 1.8; }
    
    .tab-active { background-color: #eff6ff; color: #1d4ed8; border-left: 4px solid #1d4ed8; }
    .tab-inactive { color: #4b5563; }
    .tab-inactive:hover { background-color: #f3f4f6; }
    .loader {
      border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%;
      width: 40px; height: 40px; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    @media print {
      body { background-color: white !important; margin: 0; padding: 0; }
      #header-container, #app-container { display: none !important; }
      #print-container { display: block !important; width: 100%; }
      @page { size: A4 portrait; margin: 1cm; }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col relative">

  <div id="header-container"></div>
  <main id="app-container" class="p-4 flex-1"></main>
  
  <div id="print-container" style="display: none;" class="bg-white text-black p-4"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, doc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- Custom Modal (Alert & Confirm) ---
    window.customAlert = (message, callback) => {
        const modalHtml = `
        <div id="custom-alert-modal" class="fixed inset-0 bg-black bg-opacity-60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col">
                <div class="p-5 border-b bg-blue-50 text-blue-800 font-moul font-bold flex items-center gap-2">
                    <i class="fas fa-info-circle"></i> ព័ត៌មាន
                </div>
                <div class="p-6 text-gray-700 text-center whitespace-pre-wrap">${message}</div>
                <div class="p-4 border-t flex justify-center">
                    <button id="custom-alert-btn" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-700 transition">យល់ព្រម</button>
                </div>
            </div>
        </div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('custom-alert-btn').onclick = () => {
            document.getElementById('custom-alert-modal').remove();
            if (callback) callback();
        };
    };

    window.customConfirm = (message, onYes, onNo) => {
        const modalHtml = `
        <div id="custom-confirm-modal" class="fixed inset-0 bg-black bg-opacity-60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col">
                <div class="p-5 border-b bg-orange-50 text-orange-800 font-moul font-bold flex items-center gap-2">
                    <i class="fas fa-question-circle"></i> បញ្ជាក់
                </div>
                <div class="p-6 text-gray-700 text-center whitespace-pre-wrap">${message}</div>
                <div class="p-4 border-t flex justify-end gap-3">
                    <button id="custom-confirm-no" class="bg-gray-200 text-gray-800 px-5 py-2 rounded-xl font-bold hover:bg-gray-300 transition">បោះបង់</button>
                    <button id="custom-confirm-yes" class="bg-orange-500 text-white px-5 py-2 rounded-xl font-bold hover:bg-orange-600 transition">យល់ព្រម</button>
                </div>
            </div>
        </div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('custom-confirm-no').onclick = () => {
            document.getElementById('custom-confirm-modal').remove();
            if (onNo) onNo();
        };
        document.getElementById('custom-confirm-yes').onclick = () => {
            document.getElementById('custom-confirm-modal').remove();
            if (onYes) onYes();
        };
    };

    // --- មុខងារសម្រាប់គ្រូ (Formula, Drawing, Graph) ---
    window.openFormulaGuide = () => {
        const modalHtml = `
        <div id="formula-guide-modal" class="fixed inset-0 bg-black bg-opacity-60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                <div class="p-5 border-b bg-blue-50 text-blue-800 font-moul font-bold flex justify-between items-center">
                    <span class="flex items-center gap-2"><i class="fas fa-calculator text-blue-600"></i> របៀបបញ្ចូលរូបមន្តគណិតវិទ្យា (KaTeX)</span>
                    <button onclick="document.getElementById('formula-guide-modal').remove()" class="w-8 h-8 bg-white border rounded-full hover:bg-red-100 hover:text-red-500 transition flex items-center justify-center text-gray-500 shadow-sm"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-6 overflow-y-auto flex-1 space-y-4 font-sans text-gray-700">
                    <p>ប្រព័ន្ធនេះប្រើប្រាស់ <b>KaTeX</b> សម្រាប់បង្ហាញរូបមន្តគណិតវិទ្យា។ សូមចុចប៊ូតុង <b>fx</b> នៅលើរបារឧបករណ៍ រួចវាយកូដដូចខាងក្រោម៖</p>
                    <div class="overflow-x-auto border border-gray-200 rounded-xl shadow-sm">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="bg-gray-100 border-b"><th class="p-3 font-bold border-r w-1/3">ប្រភេទរូបមន្ត</th><th class="p-3 font-bold border-r">កូដដែលត្រូវវាយ</th><th class="p-3 font-bold text-center">លទ្ធផលជាក់ស្តែង</th></tr>
                            </thead>
                            <tbody>
                                <tr class="border-b"><td class="p-3 border-r">ប្រភាគ (Fraction)</td><td class="p-3 border-r font-mono text-blue-600 bg-blue-50">\\frac{a}{b}</td><td class="p-3 text-center math-render">\\frac{a}{b}</td></tr>
                                <tr class="border-b"><td class="p-3 border-r">ស្វ័យគុណ (Superscript)</td><td class="p-3 border-r font-mono text-blue-600 bg-blue-50">x^2</td><td class="p-3 text-center math-render">x^2</td></tr>
                                <tr class="border-b"><td class="p-3 border-r">សន្ទស្សន៍ (Subscript)</td><td class="p-3 border-r font-mono text-blue-600 bg-blue-50">x_1</td><td class="p-3 text-center math-render">x_1</td></tr>
                                <tr class="border-b"><td class="p-3 border-r">ឫសការេ (Square Root)</td><td class="p-3 border-r font-mono text-blue-600 bg-blue-50">\\sqrt{x}</td><td class="p-3 text-center math-render">\\sqrt{x}</td></tr>
                                <tr class="border-b"><td class="p-3 border-r">ឫសទី n (n-th Root)</td><td class="p-3 border-r font-mono text-blue-600 bg-blue-50">\\sqrt[3]{x}</td><td class="p-3 text-center math-render">\\sqrt[3]{x}</td></tr>
                                <tr class="border-b"><td class="p-3 border-r">គុណ និង ចែក</td><td class="p-3 border-r font-mono text-blue-600 bg-blue-50">a \\times b \\div c</td><td class="p-3 text-center math-render">a \\times b \\div c</td></tr>
                                <tr class="border-b"><td class="p-3 border-r">ធំជាង, តូចជាង, មិនស្មើ</td><td class="p-3 border-r font-mono text-blue-600 bg-blue-50">a \\ge b, c \\le d, \\neq</td><td class="p-3 text-center math-render">a \\ge b, c \\le d, \\neq</td></tr>
                                <tr class="border-b"><td class="p-3 border-r">អាំងតេក្រាល (Integral)</td><td class="p-3 border-r font-mono text-blue-600 bg-blue-50">\\int_{a}^{b} x dx</td><td class="p-3 text-center math-render">\\int_{a}^{b} x dx</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.querySelectorAll('.math-render').forEach(el => {
            const tex = el.innerText;
            try { katex.render(tex, el, { throwOnError: false, displayMode: false }); } catch(e) {}
        });
    };

    let canvas, ctx, drawing = false, startX, startY, currentTool = 'pen', snapshot;
    window.setDrawTool = (tool, btnEl) => {
        currentTool = tool;
        document.querySelectorAll('.draw-tool-btn').forEach(btn => {
            btn.classList.remove('bg-blue-600', 'text-white'); btn.classList.add('bg-white', 'text-gray-700');
        });
        btnEl.classList.remove('bg-white', 'text-gray-700'); btnEl.classList.add('bg-blue-600', 'text-white');
    };
    window.clearCanvas = () => { if(ctx && canvas) { ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height); } };
    window.initCanvas = () => {
        canvas = document.getElementById('mathCanvas'); ctx = canvas.getContext('2d'); window.clearCanvas(); currentTool = 'pen';
        const getMousePos = (e) => {
            const rect = canvas.getBoundingClientRect(), scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
            const clientX = e.clientX || (e.touches && e.touches[0].clientX), clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        };
        const startDraw = (e) => { drawing = true; const pos = getMousePos(e); startX = pos.x; startY = pos.y; ctx.beginPath(); ctx.moveTo(startX, startY); snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height); };
        const draw = (e) => {
            if(!drawing) return;
            const pos = getMousePos(e), color = currentTool === 'eraser' ? '#ffffff' : document.getElementById('drawColor').value, size = document.getElementById('drawSize').value;
            ctx.strokeStyle = color; ctx.lineWidth = currentTool === 'eraser' ? size * 5 : size; ctx.lineCap = "round"; ctx.lineJoin = "round";
            if(currentTool === 'pen' || currentTool === 'eraser') { ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
            else {
                ctx.putImageData(snapshot, 0, 0); ctx.beginPath();
                if(currentTool === 'line') { ctx.moveTo(startX, startY); ctx.lineTo(pos.x, pos.y); }
                else if(currentTool === 'rect') { ctx.rect(startX, startY, pos.x - startX, pos.y - startY); }
                else if(currentTool === 'circle') { ctx.arc(startX, startY, Math.sqrt(Math.pow(pos.x - startX, 2) + Math.pow(pos.y - startY, 2)), 0, 2 * Math.PI); }
                ctx.stroke();
            }
        };
        const endDraw = () => { drawing = false; ctx.beginPath(); };
        canvas.addEventListener('mousedown', startDraw); canvas.addEventListener('mousemove', draw); canvas.addEventListener('mouseup', endDraw); canvas.addEventListener('mouseout', endDraw);
        canvas.addEventListener('touchstart', startDraw, {passive: false}); canvas.addEventListener('touchmove', draw, {passive: false}); canvas.addEventListener('touchend', endDraw);
    };
    window.insertDrawing = () => {
        if(!canvas || !window.quill) return;
        const dataUrl = canvas.toDataURL('image/png'), range = window.quill.getSelection(true), insertIndex = range ? range.index : window.quill.getLength();
        window.quill.insertEmbed(insertIndex, 'image', dataUrl); window.quill.setSelection(insertIndex + 1);
        document.getElementById('drawing-modal').remove();
    };
    window.openDrawingModal = () => {
        const modalHtml = `
        <div id="drawing-modal" class="fixed inset-0 bg-black bg-opacity-60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col">
                <div class="p-4 border-b bg-blue-50 text-blue-800 font-moul font-bold flex justify-between items-center">
                    <span class="flex items-center gap-2"><i class="fas fa-shapes text-blue-600"></i> ក្តារគូសរូបធរណីមាត្រ / ខ្សែរកោងសេរី</span>
                    <button onclick="document.getElementById('drawing-modal').remove()" class="w-8 h-8 bg-white border rounded-full hover:bg-red-100 hover:text-red-500 transition flex items-center justify-center text-gray-500 shadow-sm"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-4 bg-gray-50 flex flex-wrap gap-3 border-b items-center justify-center">
                    <div class="flex gap-1 bg-white p-1 rounded-lg border shadow-sm">
                        <button onclick="window.setDrawTool('pen', this)" class="draw-tool-btn bg-blue-600 text-white w-9 h-9 rounded flex items-center justify-center hover:bg-blue-700 transition" title="គូសសេរី (Pen)"><i class="fas fa-pen"></i></button>
                        <button onclick="window.setDrawTool('line', this)" class="draw-tool-btn bg-white text-gray-700 border border-transparent w-9 h-9 rounded flex items-center justify-center hover:bg-gray-100 transition" title="បន្ទាត់ត្រង់ (Line)"><i class="fas fa-slash" style="transform: rotate(-45deg);"></i></button>
                        <button onclick="window.setDrawTool('rect', this)" class="draw-tool-btn bg-white text-gray-700 border border-transparent w-9 h-9 rounded flex items-center justify-center hover:bg-gray-100 transition" title="ចតុកោណ (Rectangle)"><i class="far fa-square"></i></button>
                        <button onclick="window.setDrawTool('circle', this)" class="draw-tool-btn bg-white text-gray-700 border border-transparent w-9 h-9 rounded flex items-center justify-center hover:bg-gray-100 transition" title="រង្វង់ (Circle)"><i class="far fa-circle"></i></button>
                        <button onclick="window.setDrawTool('eraser', this)" class="draw-tool-btn bg-white text-gray-700 border border-transparent w-9 h-9 rounded flex items-center justify-center hover:bg-gray-100 transition" title="ជ័រលុប (Eraser)"><i class="fas fa-eraser"></i></button>
                    </div>
                    <div class="flex items-center gap-2 bg-white p-1.5 rounded-lg border shadow-sm">
                        <input type="color" id="drawColor" value="#000000" class="w-8 h-8 rounded cursor-pointer border-0 p-0 shadow-sm" title="ជ្រើសរើសពណ៌">
                        <input type="range" id="drawSize" min="1" max="15" value="2" class="w-24 cursor-pointer accent-blue-600" title="ទំហំបន្ទាត់">
                    </div>
                    <button onclick="window.clearCanvas()" class="bg-red-50 text-red-600 border border-red-200 px-4 py-2 rounded-lg hover:bg-red-100 transition font-bold shadow-sm ml-auto flex items-center gap-2"><i class="fas fa-trash-alt"></i> លុប</button>
                </div>
                <div class="p-4 bg-gray-200 flex justify-center items-center overflow-auto" style="min-height: 350px;">
                    <canvas id="mathCanvas" width="600" height="400" class="bg-white shadow-md border border-gray-300 cursor-crosshair rounded"></canvas>
                </div>
                <div class="p-4 border-t flex justify-end gap-3 bg-gray-50">
                    <button onclick="document.getElementById('drawing-modal').remove()" class="px-5 py-2 bg-white border border-gray-300 text-gray-700 rounded-xl font-bold hover:bg-gray-100 transition shadow-sm">បោះបង់</button>
                    <button onclick="window.insertDrawing()" class="px-6 py-2 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition shadow-md flex items-center gap-2"><i class="fas fa-image"></i> បញ្ចូលរូបភាព</button>
                </div>
            </div>
        </div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        window.initCanvas();
    };

    window.openGraphModal = () => {
        const modalHtml = `
        <div id="graph-modal" class="fixed inset-0 bg-black bg-opacity-60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col">
                <div class="p-4 border-b bg-blue-50 text-blue-800 font-moul font-bold flex justify-between items-center">
                    <span class="flex items-center gap-2"><i class="fas fa-chart-line text-blue-600"></i> គូសក្រាហ្វអនុគមន៍ (Function Plotter)</span>
                    <button onclick="document.getElementById('graph-modal').remove()" class="w-8 h-8 bg-white border rounded-full hover:bg-red-100 hover:text-red-500 transition flex items-center justify-center text-gray-500 shadow-sm"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-4 bg-gray-50 flex flex-wrap gap-4 border-b items-center">
                    <div class="flex-1 min-w-[200px]"><label class="block text-xs font-bold text-gray-600 mb-1">អនុគមន៍ f(x) =</label><input type="text" id="fnInput" value="x^2" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 font-mono text-lg" placeholder="ឧ. sin(x)"></div>
                    <div class="w-24"><label class="block text-xs font-bold text-gray-600 mb-1">ពណ៌បន្ទាត់</label><input type="color" id="fnColor" value="#2563eb" class="w-full h-10 p-0 border-0 rounded cursor-pointer"></div>
                    <div class="flex items-end"><button onclick="window.plotGraph()" class="bg-blue-600 text-white px-5 py-2.5 rounded-lg hover:bg-blue-700 font-bold shadow-sm flex items-center gap-2"><i class="fas fa-play"></i> បង្ហាញក្រាហ្វ</button></div>
                </div>
                <div class="p-4 bg-white flex justify-center items-center overflow-auto"><div id="graph-target" class="bg-white border border-gray-200 rounded shadow-sm"></div></div>
                <div class="p-4 border-t flex justify-end gap-3 bg-gray-50">
                    <button onclick="document.getElementById('graph-modal').remove()" class="px-5 py-2 bg-white border border-gray-300 text-gray-700 rounded-xl font-bold hover:bg-gray-100 transition shadow-sm">បោះបង់</button>
                    <button onclick="window.insertGraph()" class="px-6 py-2 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition shadow-md flex items-center gap-2"><i class="fas fa-image"></i> បញ្ចូលជារូបភាព</button>
                </div>
            </div>
        </div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        setTimeout(window.plotGraph, 100); 
    };

    window.plotGraph = () => {
        const fn = document.getElementById('fnInput').value, color = document.getElementById('fnColor').value;
        try { functionPlot({ target: '#graph-target', width: 600, height: 400, grid: true, data: [{ fn: fn, color: color, graphType: 'polyline' }] }); } 
        catch(e) { window.customAlert("សមីការមិនត្រឹមត្រូវទេ! សូមសាកល្បងម្តងទៀត។"); }
    };

    window.insertGraph = () => {
        const svgNode = document.querySelector('#graph-target svg');
        if(!svgNode) return;
        const svgData = new XMLSerializer().serializeToString(svgNode), canvas = document.createElement("canvas"), svgSize = svgNode.getBoundingClientRect();
        canvas.width = svgSize.width * 2; canvas.height = svgSize.height * 2;
        const ctx = canvas.getContext("2d"), img = new Image();
        img.onload = function() {
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL("image/png");
            if(window.quill) { const range = window.quill.getSelection(true), insertIndex = range ? range.index : window.quill.getLength(); window.quill.insertEmbed(insertIndex, 'image', dataUrl); window.quill.setSelection(insertIndex + 1); }
            document.getElementById('graph-modal').remove();
        };
        img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgData)));
    };

    // --- ការកំណត់ Firebase Setup ---
    let app, auth, db, appId;
    try {
      const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
        apiKey: "AIzaSyD1l6lkUCMkOPPE-gR3a8XardlGUUfR3pg",
        authDomain: "ictexam-1ebeb.firebaseapp.com",
        projectId: "ictexam-1ebeb",
        storageBucket: "ictexam-1ebeb.firebasestorage.app",
        messagingSenderId: "18694490334",

    const parseCSV = (text) => {
      const lines = text.split(/\r?\n/);
      if (lines.length < 2) return [];
      const parseCSVLine = (line) => {
        const result = []; let currentField = ''; let insideQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          if (char === '"' && line[i+1] === '"') { currentField += '"'; i++; } 
          else if (char === '"') { insideQuotes = !insideQuotes; } 
          else if (char === ',' && !insideQuotes) { result.push(currentField); currentField = ''; } 
          else { currentField += char; }
        }
        result.push(currentField); return result.map(f => f.trim());
      };
      const headers = parseCSVLine(lines[0]); const data = [];
      for (let i = 1; i < lines.length; i++) {
        if (lines[i].trim() === '') continue; 
        const currentLine = parseCSVLine(lines[i]);
        if (currentLine.length === headers.length) {
          const obj = {}; headers.forEach((header, index) => { obj[header] = currentLine[index]; }); data.push(obj);
        }
      }
      return data;
    };

            <div class="flex items-center gap-3">
              <button onclick="window.printStudentList()" class="bg-white border border-gray-300 text-gray-700 px-4 py-2.5 rounded-xl font-bold hover:bg-gray-50 transition shadow-sm flex items-center gap-2"><i class="fas fa-print text-blue-600"></i> បោះពុម្ព</button>
              <button onclick="window.openStudentModal()" class="bg-green-600 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-green-700 transition shadow-sm flex items-center gap-2"><i class="fas fa-user-plus"></i> បន្ថែមសិស្សថ្មី</button>
            </div>
          </div>
          <div class="flex flex-col sm:flex-row gap-4 mb-6 bg-gray-50 p-4 rounded-xl border border-gray-200 shadow-sm">
            <div class="flex-1"><label class="block text-gray-600 text-sm font-bold mb-1"><i class="fas fa-search"></i> ស្វែងរក</label><input type="text" id="searchStudent" oninput="window.filterStudentsList()" placeholder="វាយអត្តលេខ ឬឈ្មោះសិស្ស..." class="w-full p-2.5 border border-gray-300 rounded-lg bg-white shadow-sm focus:ring-2 focus:ring-blue-500 outline-none"></div>
            <div class="flex-1"><label class="block text-gray-600 text-sm font-bold mb-1"><i class="fas fa-filter"></i> ត្រងតាមថ្នាក់</label><select id="filterStdClass" onchange="window.filterStudentsList()" class="w-full p-2.5 border border-gray-300 rounded-lg bg-white shadow-sm focus:ring-2 focus:ring-blue-500 outline-none"><option value="All">គ្រប់ថ្នាក់ទាំងអស់</option>${classes.map(c => `<option value="${c}">ថ្នាក់ទី ${c}</option>`).join('')}</select></div>
          </div>
          <div class="overflow-x-auto bg-white rounded-xl shadow-sm border border-gray-200 max-h-[600px] overflow-y-auto">
            <table class="w-full text-left border-collapse relative">
              <thead class="sticky top-0 z-10 bg-gray-100 shadow-sm"><tr class="text-gray-700 text-sm border-b border-gray-300"><th class="p-4 font-bold">អត្តលេខ និងរូបភាព</th><th class="p-4 font-bold">ឈ្មោះពេញ</th><th class="p-4 font-bold text-center">ភេទ</th><th class="p-4 font-bold text-center">ថ្នាក់ទី</th><th class="p-4 font-bold text-center">លេខសម្ងាត់</th><th class="p-4 font-bold text-right">សកម្មភាព</th></tr></thead>
              <tbody class="text-sm">
                ${sortedStudents.map(s => `
                  <tr class="student-row border-b border-gray-100 hover:bg-blue-50 transition cursor-pointer" onclick="if(!event.target.closest('button')) window.openStudentModal('${s.ID}')" data-id="${s.ID}" data-name="${s.FNAME} ${s.LNAME}" data-class="${s.CLASS}">
                    <td class="p-3 flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-gray-200 overflow-hidden border-2 border-white shadow-sm flex-shrink-0"><img src="${s.PhotoURL ? s.PhotoURL.split(',')[0].trim() : ''}" onerror="this.src='https://via.placeholder.com/40?text=No'" class="w-full h-full object-cover"></div><span class="font-bold text-blue-700 bg-blue-50 px-2 py-1 rounded">${s.ID}</span></td>
                    <td class="p-3 font-semibold text-gray-800">${s.FNAME} ${s.LNAME}</td>
                    <td class="p-3 text-center">${s.GEN}</td>
                    <td class="p-3 text-center"><span class="font-bold text-purple-700 bg-purple-50 px-2 py-1 rounded border border-purple-100">${s.CLASS}</span></td>
                    <td class="p-3 text-center"><div class="text-xs text-gray-500">ឆ្នាំ: ${s.YYYY}</div><div class="font-bold text-blue-600 font-mono tracking-wider flex items-center justify-center gap-1" title="ពាក្យសម្ងាត់បច្ចុប្បន្ន">${s.PASSWORD || s.YYYY}</div></td>
                    <td class="p-3 text-right"><div class="flex justify-end gap-2"><button onclick="window.openStudentModal('${s.ID}')" class="w-8 h-8 bg-blue-100 text-blue-600 rounded-lg hover:bg-blue-200 transition shadow-sm flex items-center justify-center" title="កែប្រែ"><i class="fas fa-edit"></i></button><button onclick="window.deleteStudent('${s.ID}')" class="w-8 h-8 bg-red-100 text-red-500 rounded-lg hover:bg-red-200 transition shadow-sm flex items-center justify-center" title="លុប"><i class="fas fa-trash"></i></button></div></td>
                  </tr>`).join('')}
                <tr id="emptyStudentRow" style="display: none;"><td colspan="6" class="p-8 text-center text-gray-500">មិនមានសិស្សដែលអ្នកកំពុងស្វែងរកទេ...</td></tr>
                ${studentsData.length === 0 ? `<tr><td colspan="6" class="p-8 text-center text-gray-500">មិនទាន់មានសិស្សក្នុងប្រព័ន្ធទេ...</td></tr>` : ''}
              </tbody>
            </table>
          </div>
        `;
        
        if (isStudentModalOpen) {
           const s = editingStudentData || { ID:'', FNAME:'', LNAME:'', GEN:'ប្រុស', YYYY:'', CLASS:'', YEAR:'', PhotoURL:'', PASSWORD:'' };
           rightPanelHtml += `
             <div class="fixed inset-0 bg-black bg-opacity-60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
               <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh] animate-[fadeIn_0.2s_ease-out]">
                 <div class="p-5 border-b flex justify-between items-center bg-gradient-to-r from-blue-50 to-white">
                   <h3 class="text-xl font-moul text-blue-800"><i class="fas ${s.ID ? 'fa-user-edit text-orange-500' : 'fa-user-plus text-green-500'} mr-2"></i> ${s.ID ? 'កែប្រែព័ត៌មានសិស្ស' : 'បន្ថែមសិស្សថ្មី'}</h3>
                   <button onclick="window.closeStudentModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-red-100 hover:text-red-500 transition"><i class="fas fa-times"></i></button>
                 </div>
                 <div class="p-6 overflow-y-auto flex-1">
                   <div class="flex justify-center mb-6">
                      <div class="w-24 h-24 rounded-full border-4 border-blue-100 shadow-md overflow-hidden bg-gray-100 flex items-center justify-center relative">
                         <img src="${s.PhotoURL ? s.PhotoURL.split(',')[0].trim() : 'https://via.placeholder.com/150?text=No+Photo'}" onerror="this.src='https://via.placeholder.com/150?text=No+Photo'" class="w-full h-full object-cover" style="object-fit: cover; object-position: top;">
                      </div>
                   </div>
                   <form onsubmit="window.saveStudent(event)" class="space-y-5">
                     <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                       <div><label class="block text-gray-700 text-sm font-bold mb-1">អត្តលេខ (ID) <span class="text-red-500">*</span></label><input type="text" id="stdID" value="${s.ID}" required class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 uppercase bg-gray-50" placeholder="ឧ. S001"></div>
                       <div><label class="block text-gray-700 text-sm font-bold mb-1">ឆ្នាំកំណើត (YYYY) <span class="text-red-500">*</span></label><input type="text" id="stdYYYY" value="${s.YYYY}" required class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="ឧ. 2005"></div>
                     </div>
                     <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                       <div><label class="block text-gray-700 text-sm font-bold mb-1">នាមខ្លួន (FNAME) <span class="text-red-500">*</span></label><input type="text" id="stdFname" value="${s.FNAME}" required class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="ឧ. សាន"></div>
                       <div><label class="block text-gray-700 text-sm font-bold mb-1">នាមត្រកូល (LNAME) <span class="text-red-500">*</span></label><input type="text" id="stdLname" value="${s.LNAME}" required class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="ឧ. សុខ"></div>
                     </div>
                     <div class="grid grid-cols-3 gap-5">
                       <div><label class="block text-gray-700 text-sm font-bold mb-1">ភេទ <span class="text-red-500">*</span></label><select id="stdGen" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 bg-white"><option value="ប្រុស" ${s.GEN === 'ប្រុស' ? 'selected' : ''}>ប្រុស</option><option value="ស្រី" ${s.GEN === 'ស្រី' ? 'selected' : ''}>ស្រី</option></select></div>
                       <div><label class="block text-gray-700 text-sm font-bold mb-1">ថ្នាក់ទី <span class="text-red-500">*</span></label><input type="text" id="stdClass" value="${s.CLASS}" required class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="ឧ. 9"></div>
                       <div><label class="block text-gray-700 text-sm font-bold mb-1">ឆ្នាំសិក្សា</label><input type="text" id="stdYear" value="${s.YEAR}" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="ឧ. 2023-2024"></div>
                     </div>
                     <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                       <div><label class="block text-gray-700 text-sm font-bold mb-1">តំណភ្ជាប់រូបថត (PhotoURL)</label><input type="text" id="stdPhoto" value="${s.PhotoURL}" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="https://..."></div>
                       <div>
                         <label class="block text-gray-700 text-sm font-bold mb-1">ពាក្យសម្ងាត់ (Password) <span class="text-red-500">*</span></label>
                         <div class="relative">
                            <input type="password" id="stdPassword" value="${s.PASSWORD || s.YYYY || ''}" required class="w-full p-3 pr-10 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 bg-blue-50 font-bold" placeholder="លេខសម្ងាត់សម្រាប់ Login">
                            <i class="fas fa-eye absolute right-3 top-3.5 text-gray-400 cursor-pointer hover:text-blue-500 transition" onclick="window.togglePassword('stdPassword', this)"></i>
                         </div>
                       </div>
                     </div>
                     <div class="flex justify-end gap-3 mt-6 pt-5 border-t border-gray-200">
                       <button type="button" onclick="window.closeStudentModal()" class="px-6 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition">បោះបង់</button>
                       <button type="submit" class="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition shadow-md flex items-center gap-2"><i class="fas fa-save"></i> រក្សាទុក</button>
                     </div>
                   </form>
                 </div>
               </div>
             </div>
           `;
        }
      }

      const myProfile = teachersData.find(t => t.uid === firebaseUser.uid) || {};

      return `
        <div class="max-w-6xl mx-auto mt-4 sm:mt-8 flex flex-col lg:flex-row gap-6">
          <div class="w-full lg:w-72 bg-white p-5 rounded-2xl shadow-sm border border-gray-100 h-fit lg:sticky lg:top-24">
            <div class="flex items-center gap-3 mb-6 pb-4 border-b">
              <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-xl overflow-hidden shrink-0 border border-blue-200">
                 ${myProfile.photoURL ? `<img src="${myProfile.photoURL}" class="w-full h-full object-cover">` : `<i class="fas fa-user-shield"></i>`}
              </div>
              <div class="flex-1 overflow-hidden">
                <h2 class="text-gray-800 font-moul truncate" title="${myProfile.name || 'គណនីគ្រូ'}">${myProfile.name || 'គណនីគ្រូ'}</h2>
                <p class="text-xs text-blue-600 font-bold truncate">${myProfile.subject || 'មិនទាន់កំណត់មុខវិជ្ជា'}</p>
                <p class="text-xs text-gray-500 truncate" title="${firebaseUser.email}">${firebaseUser.email}</p>
              </div>
            </div>
            
            <nav class="space-y-1.5">
              <button onclick="window.setTeacherTab('add_questions')" class="w-full flex items-center gap-3 text-left p-3.5 rounded-xl font-bold transition text-sm ${activeTab === 'add_questions' ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-50'}">
                <i class="fas fa-plus-circle w-5 text-center text-lg"></i> បញ្ចូល១ៗ (មានរូប)
              </button>
              <button onclick="window.setTeacherTab('add_questions_table')" class="w-full flex items-center gap-3 text-left p-3.5 rounded-xl font-bold transition text-sm ${activeTab === 'add_questions_table' ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-50'}">
                <i class="fas fa-table w-5 text-center text-lg"></i> បញ្ចូលជាតារាង (Excel)
              </button>
              <button onclick="window.setTeacherTab('manage_q')" class="w-full flex items-center gap-3 text-left p-3.5 rounded-xl font-bold transition text-sm ${activeTab === 'manage_q' ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-50'}">
                <i class="fas fa-folder w-5 text-center text-lg"></i> គ្រប់គ្រងសំណួរ
              </button>
              <button onclick="window.setTeacherTab('reports')" class="w-full flex items-center gap-3 text-left p-3.5 rounded-xl font-bold transition text-sm ${activeTab === 'reports' || activeTab === 'grading_view' ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-50'}">
                <i class="fas fa-clipboard-list w-5 text-center text-lg"></i> របាយការណ៍/កែពិន្ទុ
              </button>
              <a href="stcard.html" class="w-full flex items-center gap-3 text-left p-3.5 rounded-xl font-bold transition text-sm text-gray-600 hover:bg-gray-50">
                <i class="fas fa-id-card w-5 text-center text-lg"></i> បោះពុម្ពកាតសិស្ស
              </a>
              <a href="Structure.html" class="w-full flex items-center gap-3 text-left p-3.5 rounded-xl font-bold transition text-sm text-gray-600 hover:bg-gray-50">
                <i class="fas fa-sitemap w-5 text-center text-lg"></i> រចនាសម្ព័ន្ធថ្នាក់
              </a>
              <div class="border-t my-2 pt-2"></div>
              <button onclick="window.setTeacherTab('settings')" class="w-full flex items-center gap-3 text-left p-3.5 rounded-xl font-bold transition text-sm ${activeTab === 'settings' || activeTab === 'manage_students' ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-50'}">
                <i class="fas fa-users-cog w-5 text-center text-lg"></i> កំណត់គណនី & សិស្ស
              </button>
            </nav>
          </div>
          <div class="flex-1 bg-white p-6 sm:p-8 rounded-2xl shadow-sm border border-gray-100 min-h-[500px]">
            ${rightPanelHtml}
          </div>
        </div>
        <style> .mask-bottom { mask-image: linear-gradient(to bottom, black 50%, transparent 100%); } </style>
      `;
    }

    function renderApp() {
      renderHeader();
      const container = document.getElementById('app-container');
      
      if (!userRole) {
        container.innerHTML = renderLogin();
      } else if (userRole === 'teacher') {
        container.innerHTML = renderTeacher();
        
        if (activeTab === 'add_questions') {
          setTimeout(() => {
            if (document.getElementById('qText') && !window.quill) {
              window.quill = new Quill('#qText', { theme: 'snow', modules: { formula: true, toolbar: '#quill-toolbar' }, placeholder: 'វាយបញ្ចូល ឬបិទភ្ជាប់សំណួរនៅទីនេះ...' });
            } else if (document.getElementById('qText') && window.quill) {
              window.quill = new Quill('#qText', { theme: 'snow', modules: { formula: true, toolbar: '#quill-toolbar' }, placeholder: 'វាយបញ្ចូល ឬបិទភ្ជាប់សំណួរនៅទីនេះ...' });
            }
            if(document.getElementById('qType')) window.toggleQType(document.getElementById('qType').value);
          }, 50);
        } else if (activeTab === 'add_questions_table') {
          setTimeout(() => {
            const tbody = document.getElementById('excel-tbody');
            if(tbody && tbody.children.length === 0) { window.addExcelRow(); window.addExcelRow(); window.addExcelRow(); }
          }, 50);
        }
      }
    }

    initApp();
  </script>
</body>
</html>
