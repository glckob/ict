  <!-- ទីតាំងសម្រាប់បង្ហាញទិន្នន័យពេលបោះពុម្ព (លាក់មិនឲ្យឃើញពេលធម្មតា) -->

  <script type="module">
    // បន្ថែម setDoc ទៅក្នុង import សម្រាប់រក្សាទុកទិន្នន័យសិស្សដោយកំណត់ ID
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, doc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- ការកំណត់ Firebase Setup ---
    let app, auth, db, appId;
    try {
      const firebaseConfig = {
        apiKey: "AIzaSyD1l6lkUCMkOPPE-gR3a8XardlGUUfR3pg",
        authDomain: "ictexam-1ebeb.firebaseapp.com",
        projectId: "ictexam-1ebeb",
        storageBucket: "ictexam-1ebeb.firebasestorage.app",
        messagingSenderId: "18694490334",
        appId: "1:18694490334:web:c5071b02bf72100a78da4f",
        measurementId: "G-76J5VR50NS"
      };

      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      appId = 'ictexam-app'; 
    } catch (error) {
      console.error("Firebase init error:", error);
    }

    // លុបអថេរ SHEET_CSV_URL ចេញ ព្រោះយើងនឹងយកវាទៅដាក់ក្នុងផ្ទាំងគ្រូវិញ

    // --- Global State ---
    let studentsData = [];
    let questions = [];
    let results = [];
    
    let firebaseUser = null;
    let currentUser = null; 
    let userRole = null;    
    let loadingData = true;
    let errorMsg = '';
    let loginType = 'student';

    // Student State
    let selectedMonth = '';
    let quizStarted = false;
    let quizSubmitted = false;
    let currentAnswers = {};
    let currentScore = { got: 0, total: 0, needsGrading: false };
    let availableQuestions = [];
    
    // Timer State
    let internetTime = new Date();
    let currentMonthName = '';
    let timeLeft = 0;
    let timerInterval = null;
    let quizStartTimestamp = null;
    const QUIZ_DURATION = 60 * 60; // ១ម៉ោង

    // Teacher State
    let activeTab = 'add_questions';
    let repClass = 'All';
    let repMonth = 'All';
    let editingQuestionId = null;
    let gradingResultId = null; // សម្គាល់ថាកំពុងកែពិន្ទុសិស្សមួយណា
    
    // បន្ថែម State សម្រាប់គ្រប់គ្រងទិន្នន័យសិស្ស
    let isStudentModalOpen = false;
    let editingStudentData = null;
    
    // បន្ថែម State សម្រាប់សិស្សប្តូរពាក្យសម្ងាត់
    let isChangePassModalOpen = false;

    let classes = ["7", "8", "9", "10", "11", "12"];
    const months = ["តេស្តដើមឆ្នាំ", "មករា", "កុម្ភៈ", "មីនា", "មេសា", "ឧសភា", "មិថុនា", "កក្កដា", "សីហា", "កញ្ញា", "តុលា", "វិច្ឆិកា", "ធ្នូ", "ឆមាស១", "ឆមាស២"];
    const standardMonths = ["មករា", "កុម្ភៈ", "មីនា", "មេសា", "ឧសភា", "មិថុនា", "កក្កដា", "សីហា", "កញ្ញា", "តុលា", "វិច្ឆិកា", "ធ្នូ"];

    async function fetchInternetTime() {
      try {
        const res = await fetch('https://worldtimeapi.org/api/timezone/Asia/Phnom_Penh');
        if (!res.ok) throw new Error('Network response was not ok');
        const data = await res.json();
        internetTime = new Date(data.datetime);
      } catch (e) {
        console.warn("មិនអាចទាញម៉ោងពីអ៊ីនធឺណិតបាន ប្រើប្រាស់ម៉ោងលើឧបករណ៍ជំនួសវិញ។", e);
        internetTime = new Date();
      }
      currentMonthName = standardMonths[internetTime.getMonth()]; 
    }

    const parseCSV = (text) => {
      // កែប្រែការកាត់បន្ទាត់ ដើម្បីការពារកុំឲ្យជាប់សញ្ញា \r ពី Google Sheet
      const lines = text.split(/\r?\n/);
      if (lines.length < 2) return [];

      // មុខងារជំនួយកាត់ជួរ CSV ដែលមានសញ្ញា "," ក្នុងចន្លោះធ្មេញកណ្តុរ (" ") ឲ្យបានត្រឹមត្រូវ
      const parseCSVLine = (line) => {
        const result = [];
        let currentField = '';
        let insideQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          if (char === '"' && line[i+1] === '"') {
            currentField += '"'; i++; // រំលងសញ្ញា Quote បន្តបន្ទាប់
          } else if (char === '"') {
            insideQuotes = !insideQuotes;
          } else if (char === ',' && !insideQuotes) {
            result.push(currentField); currentField = '';
          } else {
            currentField += char;
          }
        }
        result.push(currentField);
        return result.map(f => f.trim());
      };

      const headers = parseCSVLine(lines[0]);
      const data = [];
      for (let i = 1; i < lines.length; i++) {
        if (lines[i].trim() === '') continue; // រំលងជួរទទេ
        const currentLine = parseCSVLine(lines[i]);
        if (currentLine.length === headers.length) {
          const obj = {};
          headers.forEach((header, index) => {
            obj[header] = currentLine[index];
          });
          data.push(obj);
        }
      }
      return data;
    };

    async function initApp() {
      renderApp(); 
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (err) { console.error("Auth Error:", err); }

      onAuthStateChanged(auth, (user) => {
        firebaseUser = user;
        if (user) loadFirestoreData();
      });
      // លុបការទាញយកពី Google Sheet នៅពេលបើកកម្មវិធីចេញ ព្រោះយើងនឹងអានពី Firestore វិញ
    }

    function loadFirestoreData() {
      // អានទិន្នន័យសំណួរ
      const qCollection = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
      onSnapshot(query(qCollection), (snapshot) => {
        questions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        if (userRole) renderApp();
      });

      // អានទិន្នន័យពិន្ទុ
      const rCollection = collection(db, 'artifacts', appId, 'public', 'data', 'results');
      onSnapshot(query(rCollection), (snapshot) => {
        results = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        if (userRole) renderApp();
      });

      // អានទិន្នន័យសិស្សពី Firestore ផ្ទាល់ (លឿន និងមានស្ថិរភាព)
      const sCollection = collection(db, 'artifacts', appId, 'public', 'data', 'students');
      onSnapshot(query(sCollection), (snapshot) => {
        studentsData = snapshot.docs.map(doc => doc.data());
        
        // រៀបចំបញ្ជីថ្នាក់ស្វ័យប្រវត្តិ
        const uniqueClasses = new Set();
        studentsData.forEach(student => {
          if (student.CLASS) uniqueClasses.add(student.CLASS.trim());
        });
        if (uniqueClasses.size > 0) {
          classes = Array.from(uniqueClasses).sort((a, b) => {
            const numA = parseInt(a.replace(/[^0-9]/g, ''));
            const numB = parseInt(b.replace(/[^0-9]/g, ''));
            if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
            return a.localeCompare(b);
          });
        }
        loadingData = false;
        renderApp();
      });
    }

    // --- មុខងារ UI ---
    window.setLoginType = (type) => { loginType = type; errorMsg = ''; renderApp(); };

    window.handleLogin = async (e) => {
      e.preventDefault();
      // កាត់ចន្លោះទទេចោល ហើយបម្លែង ID ទៅជាអក្សរធំទាំងអស់ ដើម្បីកុំឲ្យខុសពេលវាយ s001 ឬ S001
      const idInput = document.getElementById('loginId').value.trim().toUpperCase();
      const passInput = document.getElementById('loginPass').value.trim();
      errorMsg = '';

      const btn = e.target.querySelector('button[type="submit"]');
      const originalText = btn.innerHTML;
      btn.innerHTML = 'កំពុងផ្ទៀងផ្ទាត់...'; btn.disabled = true;

      if (loginType === 'student') {
        // ផ្ទៀងផ្ទាត់ដោយប្រើប្រាស់ទិន្នន័យដែលបានកាត់ Space និងតម្រឹមជាអក្សរធំដូចគ្នា (ប្រើ PASSWORD បើមាន បើគ្មានប្រើ YYYY)
        const student = studentsData.find(s => {
          if (!s.ID) return false;
          const matchID = s.ID.toString().trim().toUpperCase() === idInput;
          const actualPass = (s.PASSWORD !== undefined && s.PASSWORD !== null && s.PASSWORD !== '') ? s.PASSWORD.toString().trim() : (s.YYYY ? s.YYYY.toString().trim() : '');
          const matchPass = actualPass === passInput;
          return matchID && matchPass;
        });
        
        if (student) {
          userRole = 'student'; currentUser = student; quizStarted = false; quizSubmitted = false; selectedMonth = '';
          await fetchInternetTime();
          renderApp();
        } else {
          errorMsg = 'ID ឬ ឆ្នាំកំណើត (YYYY) មិនត្រឹមត្រូវ!'; btn.innerHTML = originalText; btn.disabled = false; renderApp();
        }
      } else if (loginType === 'teacher') {
        try {
          const userCredential = await signInWithEmailAndPassword(auth, idInput, passInput);
          userRole = 'teacher'; currentUser = { email: userCredential.user.email };
          renderApp();
        } catch (error) {
          errorMsg = 'អ៊ីមែល ឬ លេខសម្ងាត់មិនត្រឹមត្រូវ!'; btn.innerHTML = originalText; btn.disabled = false; renderApp();
        }
      }
    };

    window.logout = async () => {
      if (userRole === 'teacher') {
        await signOut(auth); signInAnonymously(auth).catch(console.error); 
      }
      if (timerInterval) clearInterval(timerInterval); 
      userRole = null; currentUser = null; loginType = 'student'; renderApp();
    };

    window.handleMonthChange = (val) => { selectedMonth = val; renderApp(); };

    function updateTimerUI() {
      const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
      const s = (timeLeft % 60).toString().padStart(2, '0');
      const el = document.getElementById('quiz-timer');
      if (el) {
        el.innerHTML = `<i class="fas fa-clock"></i> ម៉ោងនៅសល់: ${m}:${s}`;
        if (timeLeft < 300) el.classList.add('animate-pulse', 'bg-red-700'); 
      }
    }

    function startTimerCountdown() {
      if (timerInterval) clearInterval(timerInterval);
      updateTimerUI(); 
      timerInterval = setInterval(() => {
        timeLeft--; updateTimerUI();
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          alert("ម៉ោងប្រឡងរបស់អ្នកបានបញ្ចប់! ចម្លើយកំពុងត្រូវបានបញ្ជូនដោយស្វ័យប្រវត្តិ។");
          window.submitQuiz(true); 
        }
      }, 1000);
    }

    window.startQuiz = async () => {
      let validQuestions = questions.filter(q => {
        const qClasses = Array.isArray(q.classLevel) ? q.classLevel : [q.classLevel];
        return qClasses.includes(currentUser.CLASS) && q.month === selectedMonth && q.status === 'online';
      });
      if (validQuestions.length === 0) { alert('មិនមានសំណួរសម្រាប់ខែនេះទេ!'); return; }
      
      const questionSessionKey = `quiz_questions_${currentUser.ID}_${selectedMonth}`;
      const optionSessionKey = `quiz_options_${currentUser.ID}_${selectedMonth}`;
      
      let savedQuestionIds = localStorage.getItem(questionSessionKey);
      
      if (savedQuestionIds) {
        // ទាញយកសំណួរចៃដន្យចាស់មកវិញ បើសិស្សធ្លាប់ចុចចាប់ផ្តើមរួចហើយ (ការពារការបន្លំ Refresh)
        const idsArray = JSON.parse(savedQuestionIds);
        availableQuestions = idsArray.map(id => validQuestions.find(q => q.id === id)).filter(Boolean);
        if (availableQuestions.length === 0) savedQuestionIds = null; // ចាប់យកថ្មីបើសំណួរចាស់ត្រូវគ្រូលុបចោល
      }
      
      if (!savedQuestionIds) {
        // ក្រឡុកសំណួរ (Shuffle Array)
        let shuffled = [...validQuestions];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        
        // ជ្រើសរើសសំណួរដោយចៃដន្យ ឲ្យបានពិន្ទុសរុបមិនលើស ៥០ ពិន្ទុ
        let currentTotal = 0;
        availableQuestions = [];
        const selectedIds = [];
        let orderMap = {};
        
        for (const q of shuffled) {
            const pts = Number(q.points) || 0;
            if (currentTotal + pts <= 50) {
                availableQuestions.push(q);
                selectedIds.push(q.id);
                currentTotal += pts;
                
                // ក្រឡុកជម្រើសចម្លើយសម្រាប់សំណួរនីមួយៗ
                if (q.type !== 'essay' && q.options) {
                    let order = q.options.map((_, i) => i);
                    for (let i = order.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [order[i], order[j]] = [order[j], order[i]];
                    }
                    orderMap[q.id] = order;
                }
            }
        }
        
        if (availableQuestions.length === 0) {
          alert('មិនមានសំណួរដែលមានពិន្ទុត្រឹមត្រូវ (<= ៥០) សម្រាប់ប្រឡងទេ!'); 
          return; 
        }
        // រក្សាទុកសំណួរដែលចាប់បាន ដើម្បីកុំឲ្យដូរពេលបិទបើក
        localStorage.setItem(questionSessionKey, JSON.stringify(selectedIds));
        localStorage.setItem(optionSessionKey, JSON.stringify(orderMap));
      }

      await fetchInternetTime();
      const sessionKey = `quiz_time_${currentUser.ID}_${selectedMonth}`;
      let savedStartTime = localStorage.getItem(sessionKey);
      
      if (!savedStartTime) {
        savedStartTime = internetTime.getTime(); localStorage.setItem(sessionKey, savedStartTime);
      }
      
      quizStartTimestamp = parseInt(savedStartTime);
      const elapsedSeconds = Math.floor((internetTime.getTime() - quizStartTimestamp) / 1000);
      timeLeft = Math.max(0, QUIZ_DURATION - elapsedSeconds);

      if (timeLeft <= 0) { alert("ម៉ោងប្រឡងរបស់អ្នកបានផុតកំណត់ហើយ!"); window.submitQuiz(true); return; }

      quizStarted = true; currentAnswers = {}; quizSubmitted = false;
      renderApp(); startTimerCountdown();
    };

    window.selectAnswer = (qId, val) => {
      currentAnswers[qId] = val;
      if(typeof val === 'number' || typeof val === 'string' && !isNaN(val) && val !== '') {
        // Update UI សម្រាប់ជម្រើស Multiple Choice
        document.querySelectorAll(`.opt-container-${qId}`).forEach(el => el.classList.remove('option-checked', 'bg-blue-100', 'border-blue-500'));

    window.submitQuiz = async (isAutoSubmit = false) => {
      // ឆែកមើលសំណួរដែលមិនទាន់ឆ្លើយ (រាប់បញ្ចូលទាំងប្រអប់ទទេសម្រាប់ Essay)
      const unanswered = availableQuestions.some(q => {
        if (currentAnswers[q.id] === undefined || currentAnswers[q.id] === null) return true;
        if (q.type === 'essay' && String(currentAnswers[q.id]).trim() === '') return true;
        return false;
      });

      if (!isAutoSubmit && unanswered) {
        if (!confirm('អ្នកមិនទាន់ឆ្លើយគ្រប់សំណួរទេ។ តើចង់បញ្ជូនឬទេ?')) return;
      }

      if (timerInterval) clearInterval(timerInterval);
      
      let gotScore = 0; let totalPts = 0; let hasEssay = false;
      let questionScores = {};
      let originalAnswers = {};

      availableQuestions.forEach(q => {
        totalPts += Number(q.points);
        if (q.type === 'essay') {
          hasEssay = true;
          questionScores[q.id] = 0; // មិនទាន់កែ ពិន្ទុ=០ សិន
          originalAnswers[q.id] = currentAnswers[q.id];
        } else {
          // បម្លែងជម្រើសចម្លើយដែលសិស្សជ្រើសរើស ទៅជាទីតាំងដើមរបស់វាវិញ មុននឹងដាក់ចូលប្រព័ន្ធកែ
          let studentShuffledAnswer = currentAnswers[q.id];
          let originalAnswerIndex = null;
          
          if (studentShuffledAnswer !== undefined && studentShuffledAnswer !== null && studentShuffledAnswer !== '') {
             originalAnswerIndex = q.originalOrder ? q.originalOrder[Number(studentShuffledAnswer)] : Number(studentShuffledAnswer);
          }
          originalAnswers[q.id] = originalAnswerIndex;

          let realCorrectAnswer = q.originalCorrectAnswer !== undefined ? q.originalCorrectAnswer : q.correctAnswer;
          
          if (originalAnswerIndex == realCorrectAnswer) {
            gotScore += Number(q.points);
            questionScores[q.id] = Number(q.points);
          } else {
            questionScores[q.id] = 0;
          }
        }
      });

      currentScore = { got: gotScore, total: totalPts, needsGrading: hasEssay };
      
      try {
        const resultsRef = collection(db, 'artifacts', appId, 'public', 'data', 'results');
        await addDoc(resultsRef, {
          studentId: currentUser.ID,
          studentName: `${currentUser.FNAME} ${currentUser.LNAME}`,
          classLevel: currentUser.CLASS,
          month: selectedMonth,
          score: gotScore,
          totalPoints: totalPts,
          answers: originalAnswers,
          questionScores: questionScores,
          needsGrading: hasEssay,
          timestamp: serverTimestamp()
        });
        
        localStorage.removeItem(`quiz_time_${currentUser.ID}_${selectedMonth}`);
        localStorage.removeItem(`quiz_questions_${currentUser.ID}_${selectedMonth}`); // លុបឈុតសំណួរពេលបញ្ជូនជោគជ័យ
        localStorage.removeItem(`quiz_options_${currentUser.ID}_${selectedMonth}`); // លុបលំដាប់ជម្រើសចម្លើយ
        quizSubmitted = true; quizStarted = false; renderApp();
      } catch (err) { alert("មានបញ្ហាក្នុងការរក្សាទុកពិន្ទុ។"); }

    // --- មុខងារទាញយកទិន្នន័យសិស្ស (Sync Students) ---
    window.syncStudents = async () => {
      const url = document.getElementById('sheetUrl').value.trim();
      if(!url) return alert("សូមបញ្ចូលតំណភ្ជាប់ Google Sheet CSV!");
      
      const btn = document.getElementById('btnSync');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> កំពុងទាញយក...'; 
      btn.disabled = true;

      try {
        const res = await fetch(url);
        const text = await res.text();
        const parsed = parseCSV(text);

        if(parsed.length === 0) throw new Error("គ្មានទិន្នន័យក្នុង Sheet");

        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> កំពុងរក្សាទុកទៅ Firestore...';
        
        let validCount = 0;
        let duplicateCount = 0;
        let missingIdCount = 0;
        const seenIds = new Set();
        const batchPromises = [];

        // រក្សាទុកទិន្នន័យសិស្សម្នាក់ៗទៅក្នុង Firestore
        parsed.forEach(s => {
          if(!s.ID || s.ID.toString().trim() === '') {
            missingIdCount++; // រាប់ចំនួនជួរដែលអត់មាន ID
            return;
          }
          
          // សម្អាតទិន្នន័យ (Clean Data)
          const cleanID = s.ID.toString().trim().toUpperCase();
          
          // ឆែកមើលក្រែងលោមាន ID ជាន់គ្នា
          if(seenIds.has(cleanID)) {
            duplicateCount++;
            return; // រំលងមិន Save ជាន់ពីលើទេ ដើម្បីការពារការបាត់ទិន្នន័យ
          }
          seenIds.add(cleanID);
          validCount++;

          const cleanYYYY = (s.YYYY || '').toString().trim();
          const cleanClass = (s.CLASS || '').toString().trim();
          
          // រក្សាទុកលេខសម្ងាត់ដែលសិស្សបានប្តូររួច កុំឲ្យបាត់ពេល Sync ទិន្នន័យថ្មី
          const existingStudent = studentsData.find(st => st.ID === cleanID);
          const currentPassword = existingStudent && existingStudent.PASSWORD ? existingStudent.PASSWORD : cleanYYYY;
          
          const sRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', cleanID);
          batchPromises.push(setDoc(sRef, {
            ...s,
            ID: cleanID,
            YYYY: cleanYYYY,
            CLASS: cleanClass,
            PASSWORD: currentPassword,
            updatedAt: serverTimestamp()
          }, { merge: true }));
        });

        await Promise.all(batchPromises);
        
        let msg = `ទាញយក និងរក្សាទុកទិន្នន័យសិស្សបានចំនួន ${validCount} នាក់ជោគជ័យ!`;
        if (duplicateCount > 0) {
          msg += `\n\n⚠️ រកឃើញអត្តលេខ (ID) ជាន់គ្នា ចំនួន ${duplicateCount} នាក់ (ប្រព័ន្ធមិនអនុញ្ញាតឲ្យជាន់គ្នាទេ សូមឆែកមើលក្នុង Google Sheet ឡើងវិញ)។`;
        }
        if (missingIdCount > 0) {
          msg += `\n⚠️ រកឃើញជួរទទេរ (គ្មានអត្តលេខ) ចំនួន ${missingIdCount} ជួរ (ត្រូវបានរំលង)។`;
        }
        
        alert(msg);
      } catch(err) {
        console.error("Sync Error:", err);
        alert("មានបញ្ហាក្នុងការទាញយកទិន្នន័យសិស្ស។ សូមពិនិត្យមើលតំណភ្ជាប់ម្តងទៀត។");
      } finally {
        btn.innerHTML = '<i class="fas fa-cloud-download-alt mr-2"></i> ទាញយកទិន្នន័យចូលប្រព័ន្ធ'; 
        btn.disabled = false;
      }
    };

        const classA = a.CLASS || '';
        const classB = b.CLASS || '';
        const numA = parseInt(classA.replace(/[^0-9]/g, '')) || 0;
        const numB = parseInt(classB.replace(/[^0-9]/g, '')) || 0;
        if (numA !== numB) return numA - numB; 
        
        const strA = classA.replace(/[0-9]/g, '');
        const strB = classB.replace(/[0-9]/g, '');
        if (strA !== strB) return strA.localeCompare(strB); 
        
        return (a.FNAME || '').localeCompare(b.FNAME || ''); 
      });

      // ច្រោះយកតែទិន្នន័យដែលកំពុងបង្ហាញ
      const filtered = sortedStudents.filter(s => {
        const id = (s.ID || '').toLowerCase();

        const cls = s.CLASS || '';
        const matchQuery = id.includes(query) || name.includes(query);
        const matchClass = filterClass === 'All' || cls === filterClass;
        return matchQuery && matchClass;
      });

          <div>មុខវិជ្ជា៖ ព័ត៌មានវិទ្យា (វង្ស សាណូវុទ្ធ)</div>

              <thead>${tableHeader}</thead>
              <tbody>${renderTableRows(leftCol, 0)}</tbody>

          <div style="flex: 1;">
            <table style="width: 100%; border-collapse: collapse; border: 2px solid #333; font-size: 13px;">
              <thead>${tableHeader}</thead>
              <tbody>${renderTableRows(rightCol, mid)}</tbody>

          </div>
          ` : '<div style="flex: 1;"></div>'}

      pContainer.innerHTML = printHtml;
      
      // ពន្យាពេលបន្តិចដើម្បីឲ្យ Browser Render HTML រួចរាល់មុននឹងបញ្ជា Print
      setTimeout(() => {
        window.print();
      }, 150);
    };

    // --- មុខងារបោះពុម្ពរបាយការណ៍ពិន្ទុ (Print Score Report) ---
    window.printScoreReport = () => {

      let filteredResults = results.filter(r => {

        <div style="text-align: center; font-size: 15px; margin-bottom: 20px; font-family: 'Hanuman', sans-serif;">មុខវិជ្ជា៖ ព័ត៌មានវិទ្យា | លោកគ្រូ៖ វង្ស សាណូវុទ្ធ</div>
        <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 12px; font-weight: bold; font-family: 'Hanuman', sans-serif;">
          <div>ចំណាត់ថ្នាក់៖ ${titleClass} | ${titleMonth}</div>

                    <th style="${thStyle} width: 80px;">ពិន្ទុទទួលបាន</th>

    // --- មុខងារបញ្ចូលសំណួរបែបតារាង (Excel Style) ---
    window.toggleExcelRowType = (selectEl) => {
      const tr = selectEl.closest('tr');
      const isEssay = selectEl.value === 'essay';
      tr.querySelector('.eq-opta').disabled = isEssay;
      tr.querySelector('.eq-optb').disabled = isEssay;
      tr.querySelector('.eq-optc').disabled = isEssay;
      tr.querySelector('.eq-optd').disabled = isEssay;
      tr.querySelector('.eq-correct').disabled = isEssay;

      if(isEssay) {
        tr.querySelectorAll('.eq-opta, .eq-optb, .eq-optc, .eq-optd, .eq-correct').forEach(el => el.classList.add('bg-gray-100', 'opacity-50'));
      } else {
        tr.querySelectorAll('.eq-opta, .eq-optb, .eq-optc, .eq-optd, .eq-correct').forEach(el => el.classList.remove('bg-gray-100', 'opacity-50'));
      }
    };

    window.addExcelRow = () => {
      const tbody = document.getElementById('excel-tbody');
      if(!tbody) return;
      const tr = document.createElement('tr');
      tr.className = 'excel-row bg-white hover:bg-blue-50 transition border-b border-gray-200';
      tr.innerHTML = `
        <td class="p-1.5 border-r"><input type="text" class="w-16 p-1.5 border border-gray-300 rounded eq-class text-sm focus:ring-1 focus:ring-blue-500" placeholder="ឧ. 9,10"></td>
        <td class="p-1.5 border-r">
          <select class="w-20 p-1.5 border border-gray-300 rounded eq-month text-sm focus:ring-1 focus:ring-blue-500">
            ${months.map(m => `<option value="${m}">${m}</option>`).join('')}
          </select>
        </td>
        <td class="p-1.5 border-r">
          <select class="w-20 p-1.5 border border-gray-300 rounded eq-type text-sm focus:ring-1 focus:ring-blue-500" onchange="window.toggleExcelRowType(this)">
            <option value="multiple_choice">ជ្រើសរើស</option>
            <option value="essay">សរសេរ</option>
          </select>
        </td>
        <td class="p-1.5 border-r"><input type="number" class="w-14 p-1.5 border border-gray-300 rounded eq-points text-sm text-center focus:ring-1 focus:ring-blue-500" value="10" min="1"></td>
        <td class="p-1.5 border-r"><textarea class="w-48 p-1.5 border border-gray-300 rounded eq-text text-sm focus:ring-1 focus:ring-blue-500 resize-y" rows="1" placeholder="វាយសំណួរ..."></textarea></td>
        <td class="p-1.5 border-r"><input type="text" class="w-20 p-1.5 border border-gray-300 rounded eq-opta text-sm focus:ring-1 focus:ring-blue-500" placeholder="ចម្លើយ A"></td>
        <td class="p-1.5 border-r"><input type="text" class="w-20 p-1.5 border border-gray-300 rounded eq-optb text-sm focus:ring-1 focus:ring-blue-500" placeholder="ចម្លើយ B"></td>
        <td class="p-1.5 border-r"><input type="text" class="w-20 p-1.5 border border-gray-300 rounded eq-optc text-sm focus:ring-1 focus:ring-blue-500" placeholder="ចម្លើយ C"></td>
        <td class="p-1.5 border-r"><input type="text" class="w-20 p-1.5 border border-gray-300 rounded eq-optd text-sm focus:ring-1 focus:ring-blue-500" placeholder="ចម្លើយ D"></td>
        <td class="p-1.5 border-r">
          <select class="w-14 p-1.5 border border-gray-300 rounded eq-correct text-sm font-bold text-blue-600 focus:ring-1 focus:ring-blue-500">

    window.saveExcelTable = async () => {
      const rows = document.querySelectorAll('.excel-row');
      if(rows.length === 0) return;
      
      const btn = document.getElementById('btnSaveExcel');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> កំពុងរក្សាទុក...'; 
      btn.disabled = true;

      const batchPromises = [];
      let validCount = 0;

      for(let tr of rows) {
        const txt = tr.querySelector('.eq-text').value.trim();
        if(!txt) continue; // រំលងជួរទទេដែលអត់មានសំណួរ

        const clsStr = tr.querySelector('.eq-class').value;
        const cls = clsStr.split(',').map(c => c.trim()).filter(c => c);
        if(cls.length === 0) {
          alert('មានសំណួរដែលមិនទាន់បានបញ្ជាក់ថ្នាក់ទី (សូមមើលក្នុងតារាង)!');
          btn.innerHTML = originalText; btn.disabled = false;
          return;
        }

        const mth = tr.querySelector('.eq-month').value;
        const typ = tr.querySelector('.eq-type').value;
        const pts = Number(tr.querySelector('.eq-points').value) || 10;
        
        let opts = [];
        let corr = null;

        if(typ === 'multiple_choice') {
          opts = [
            tr.querySelector('.eq-opta').value,
            tr.querySelector('.eq-optb').value,
            tr.querySelector('.eq-optc').value,
            tr.querySelector('.eq-optd').value
          ];
          corr = Number(tr.querySelector('.eq-correct').value);
        }

        batchPromises.push(addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), {
          classLevel: cls,
          month: mth,
          type: typ,
          points: pts,
          text: txt, 
          options: opts,
          correctAnswer: corr,
          status: 'offline', // រក្សាទុកជា Offline សិនដើម្បីកុំអោយសិស្សឃើញភ្លាមៗ
          createdAt: serverTimestamp()
        }));
        validCount++;
      }

      if(validCount === 0) {
        alert("សូមវាយបញ្ចូលសំណួរយ៉ាងហោចណាស់មួយជួរ!");
        btn.innerHTML = originalText; btn.disabled = false;
        return;
      }

      try {
        await Promise.all(batchPromises);
        alert(`បានរក្សាទុកចំនួន ${validCount} សំណួរដោយជោគជ័យ! សំណួរត្រូវបានកំណត់ជា Offline។`);
        document.getElementById('excel-tbody').innerHTML = ''; // លុបតារាងចាស់ចោល
        window.addExcelRow(); 
        window.addExcelRow(); 
        window.addExcelRow(); // បង្កើតជួរថ្មី ៣ វិញ
      } catch(e) {
        console.error(e);
        alert('មានបញ្ហាក្នុងការរក្សាទុក!');
      } finally {
        btn.innerHTML = originalText; btn.disabled = false;
      }
    };

    // --- មុខងារកែពិន្ទុ (Grading) ---
    window.openGrading = (id) => { gradingResultId = id; activeTab = 'grading_view'; renderApp(); };
    window.closeGrading = () => { gradingResultId = null; activeTab = 'reports'; renderApp(); };

    window.saveGrading = async () => {
      const res = results.find(r => r.id === gradingResultId);
      if(!res) return;
      
      let newTotal = 0;
      let newQScores = { ...(res.questionScores || {}) };
      
      // ចាប់យកតម្លៃពី Input ទាំងអស់
      const inputs = document.querySelectorAll('.grade-input');
      inputs.forEach(input => {
        const qId = input.getAttribute('data-qid');
        const val = Number(input.value) || 0;
        newQScores[qId] = val;
        newTotal += val;
      });

      const btn = document.getElementById('btnSaveGrade');
      btn.innerHTML = 'កំពុងរក្សាទុក...'; btn.disabled = true;

      try {
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'results', gradingResultId), {
          score: newTotal,
          questionScores: newQScores,
          needsGrading: false // បញ្ជាក់ថាកែរួចរាល់
        });
        alert("រក្សាទុកពិន្ទុរួចរាល់!");
        window.closeGrading();
      } catch(err) {
        alert("មានបញ្ហាក្នុងការរក្សាទុក។"); btn.innerHTML = 'រក្សាទុកពិន្ទុ'; btn.disabled = false;
      }
    };

    function renderStudent() {

        const qClasses = Array.isArray(q.classLevel) ? q.classLevel : [q.classLevel];

      // ទាញយកសំណួរចៃដន្យដើម្បីបង្ហាញអោយសិស្សធ្វើ
      const questionSessionKey = `quiz_questions_${currentUser.ID}_${selectedMonth}`;
      const optionSessionKey = `quiz_options_${currentUser.ID}_${selectedMonth}`;
      let savedQuestionIds = localStorage.getItem(questionSessionKey);
      let savedOptionOrders = localStorage.getItem(optionSessionKey) ? JSON.parse(localStorage.getItem(optionSessionKey)) : {};

      if (savedQuestionIds && quizStarted) {
         const idsArray = JSON.parse(savedQuestionIds);
         availableQuestions = idsArray.map(id => {
             let q = validQuestions.find(q => q.id === id);
             if(!q) return null;
             
             // បង្កើតច្បាប់ចម្លង (Deep Copy) ដើម្បីកុំឲ្យប៉ះពាល់ដល់ទិន្នន័យដើម
             let qCopy = JSON.parse(JSON.stringify(q));
             if (qCopy.type !== 'essay' && qCopy.options) {
                 let order = savedOptionOrders[qCopy.id];
                 if (!order) order = qCopy.options.map((_, i) => i);
                 
                 qCopy.originalOptions = qCopy.options;
                 qCopy.originalCorrectAnswer = qCopy.correctAnswer;
                 qCopy.originalOrder = order;
                 
                 // រៀបជម្រើសចម្លើយថ្មីទៅតាមលំដាប់ដែលបានក្រឡុក (Shuffled Array)
                 qCopy.options = order.map(i => qCopy.originalOptions[i]);
                 qCopy.correctAnswer = order.indexOf(qCopy.originalCorrectAnswer);
             }
             return qCopy;
         }).filter(Boolean);
      } else {
         availableQuestions = validQuestions; 
      }
      
      const currentMonthIndex = standardMonths.indexOf(currentMonthName);
      const selectedMonthIndex = standardMonths.indexOf(selectedMonth);

                theme: 'snow',
                modules: { formula: true, toolbar: '#quill-toolbar' },
                placeholder: 'វាយបញ្ចូល ឬបិទភ្ជាប់សំណួរនៅទីនេះ...'
              });
            } else if (document.getElementById('qText') && window.quill) {
              window.quill = new Quill('#qText', {
                theme: 'snow',
                modules: { formula: true, toolbar: '#quill-toolbar' },
                placeholder: 'វាយបញ្ចូល ឬបិទភ្ជាប់សំណួរនៅទីនេះ...'
              });
            }
            if(document.getElementById('qType')) window.toggleQType(document.getElementById('qType').value);
          }, 50);
        } else if (activeTab === 'add_questions_table') {
          setTimeout(() => {
            const tbody = document.getElementById('excel-tbody');
            if(tbody && tbody.children.length === 0) {
              // បង្កើត ៣ជួរជាស្រេចពេលចូលមកកាន់ Tab នេះ
              window.addExcelRow();
              window.addExcelRow();
              window.addExcelRow();
            }
          }, 50);
        }
      }
    }

    initApp();
  </script>
</body>
</html>
