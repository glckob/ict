<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ប្រព័ន្ធប្រឡងអនឡាញ វិទ្យាល័យកូប</title>
  
  <link rel="icon" href="https://www.dropbox.com/scl/fi/2tds3u7hcslgrtcnfimdg/nv.ico?rlkey=t4swsdf8hv7iwbg23pjknp0wn&st=84qf47bv&dl=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;600;700&family=Moul&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Noto Sans Khmer', sans-serif; background-color: #f3f4f6; }
    .font-moul { font-family: 'Moul', cursive; font-weight: normal; line-height: 1.8; }
    
    .loader {
      border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%;
      width: 40px; height: 40px; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">

  <div class="bg-white p-6 sm:p-10 rounded-3xl shadow-xl max-w-md w-full mx-4 border-t-4 border-blue-600 relative overflow-hidden">
    <!-- Decorative Background -->
    <div class="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-bl-full -z-10"></div>
    
    <div class="text-center mb-8">
      <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl shadow-sm border-2 border-white ring-4 ring-blue-50">
        <i class="fas fa-graduation-cap"></i>
      </div>
      <h1 class="text-2xl sm:text-3xl text-gray-800 mb-2 font-moul">វិទ្យាល័យកូប</h1>
      <p class="text-gray-500 font-medium text-sm">ប្រព័ន្ធប្រឡង និងគ្រប់គ្រងការសិក្សា</p>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-2">អត្តលេខសិស្ស (ID) ឬ អ៊ីមែលគ្រូ <span class="text-red-500">*</span></label>
        <div class="relative">
          <i class="fas fa-user-circle absolute left-4 top-3.5 text-gray-400 text-lg"></i>
          <input type="text" id="loginId" class="w-full p-3.5 pl-12 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 bg-gray-50 transition" required placeholder="ឧ. S001 ឬ teacher@school.com" autocomplete="off">
        </div>
      </div>
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-2">ពាក្យសម្ងាត់ (Password) <span class="text-red-500">*</span></label>
        <div class="relative">
          <i class="fas fa-lock absolute left-4 top-3.5 text-gray-400 text-lg"></i>
          <input type="password" id="loginPass" class="w-full p-3.5 pl-12 pr-12 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 bg-gray-50 transition" required placeholder="••••••••">
          <button type="button" id="togglePassBtn" class="absolute right-4 top-3.5 text-gray-400 hover:text-blue-500 transition focus:outline-none">
            <i class="fas fa-eye" id="togglePassIcon"></i>
          </button>
        </div>
      </div>

      <div id="errorBox" class="hidden bg-red-50 text-red-600 p-3 rounded-lg text-sm items-start gap-2 border border-red-100">
        <i class="fas fa-exclamation-circle mt-0.5"></i> <span id="errorMsg"></span>
      </div>

      <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition shadow-lg mt-4 flex justify-center items-center gap-2 text-lg">
        ចូលប្រព័ន្ធ <i class="fas fa-arrow-right"></i>
      </button>
    </form>
    
    <div id="loadingBox" class="flex flex-col items-center justify-center mt-6 text-blue-600 bg-blue-50 p-4 rounded-xl border border-blue-100">
      <div class="loader mb-3 border-blue-200 border-top-blue-600"></div>
      <p class="text-sm font-semibold">កំពុងភ្ជាប់ទិន្នន័យប្រព័ន្ធ...</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- Firebase Setup ---
    let app, auth, db, appId;
    try {
      const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
        apiKey: "AIzaSyD1l6lkUCMkOPPE-gR3a8XardlGUUfR3pg",
        authDomain: "ictexam-1ebeb.firebaseapp.com",
        projectId: "ictexam-1ebeb",
        storageBucket: "ictexam-1ebeb.firebasestorage.app",
        messagingSenderId: "18694490334",
        appId: "1:18694490334:web:c5071b02bf72100a78da4f",
        measurementId: "G-76J5VR50NS"
      };

      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      appId = typeof __app_id !== 'undefined' ? __app_id : 'ictexam-app'; 
    } catch (error) { console.error("Firebase init error:", error); }

    let studentsData = [];
    let isDataLoaded = false;

    // Check if already logged in (Auto Redirect)
    const checkExistingSession = (user) => {
        if (user && !user.isAnonymous) {
            // Teacher session exists in Firebase Auth
            window.location.href = 'teacher.html';
            return true;
        } else if (localStorage.getItem('studentSession')) {
            // Student session exists in LocalStorage
            window.location.href = 'student.html';
            return true;
        }
        return false;
    };

    const initApp = async () => {
        // Disable form until data loads
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').classList.add('opacity-50', 'cursor-not-allowed');

        try {
            // Check auth state
            onAuthStateChanged(auth, (user) => {
                if (checkExistingSession(user)) return;
                
                // If not logged in, authenticate anonymously to fetch student data
                if (!user) {
                    signInAnonymously(auth).catch(console.error);
                } else {
                    loadStudentsData();
                }
            });
        } catch (err) { console.error("Auth Error:", err); }
    };

    const loadStudentsData = () => {
        const sCollection = collection(db, 'artifacts', appId, 'public', 'data', 'students');
        onSnapshot(query(sCollection), (snapshot) => {
            studentsData = snapshot.docs.map(doc => doc.data());
            isDataLoaded = true;
            
            // Hide loading, enable form
            document.getElementById('loadingBox').style.display = 'none';
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').classList.remove('opacity-50', 'cursor-not-allowed');
        }, (err) => {
            console.error("Error fetching students:", err);
            showError("មានបញ្ហាក្នុងការភ្ជាប់ទិន្នន័យបណ្តាញ!");
        });
    };

    const showError = (msg) => {
        const errorBox = document.getElementById('errorBox');
        document.getElementById('errorMsg').innerText = msg;
        errorBox.style.display = 'flex';
    };

    const hideError = () => {
        document.getElementById('errorBox').style.display = 'none';
    };

    // Toggle Password Visibility
    document.getElementById('togglePassBtn').addEventListener('click', () => {
        const input = document.getElementById('loginPass');
        const icon = document.getElementById('togglePassIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash', 'text-blue-500');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash', 'text-blue-500');
            icon.classList.add('fa-eye');
        }
    });

    // Handle Login Submission (Smart Detection)
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const idInput = document.getElementById('loginId').value.trim();
        const passInput = document.getElementById('loginPass').value.trim();
        
        const btn = document.getElementById('submitBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> កំពុងផ្ទៀងផ្ទាត់...';
        btn.disabled = true;

        // SMART LOGIC: If input contains '@', treat as Teacher. Else, treat as Student.
        if (idInput.includes('@')) {
            // --- Teacher Login Flow ---
            try {
                await signInWithEmailAndPassword(auth, idInput.toLowerCase(), passInput);
                // Redirect will be handled by onAuthStateChanged, or force it:
                window.location.href = 'teacher.html';
            } catch (error) {
                showError('អ៊ីមែល ឬ លេខសម្ងាត់គ្រូមិនត្រឹមត្រូវទេ!');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        } else {
            // --- Student Login Flow ---
            if (!isDataLoaded) {
                showError('ទិន្នន័យមិនទាន់រួចរាល់ សូមរង់ចាំបន្តិច...');
                btn.innerHTML = originalText;
                btn.disabled = false;
                return;
            }

            const student = studentsData.find(s => {
                if (!s.ID) return false;
                const matchID = s.ID.toString().trim().toUpperCase() === idInput.toUpperCase();
                const actualPass = (s.PASSWORD !== undefined && s.PASSWORD !== null && s.PASSWORD !== '') ? s.PASSWORD.toString().trim() : (s.YYYY ? s.YYYY.toString().trim() : '');
                return matchID && actualPass === passInput;
            });
            
            if (student) {
                // Save student session locally
                localStorage.setItem('studentSession', JSON.stringify(student));
                window.location.href = 'student.html';
            } else {
                showError('អត្តលេខ (ID) ឬ ពាក្យសម្ងាត់សិស្សមិនត្រឹមត្រូវទេ!');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    });

    initApp();
  </script>
</body>
</html>
