  <main id="app-container" class="p-4 flex-1"></main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, signInWithEmailAndPassword, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, doc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- ការកំណត់ Firebase Setup ---
    let app, auth, db, appId;
    try {
      const firebaseConfig = {
        apiKey: "AIzaSyD1l6lkUCMkOPPE-gR3a8XardlGUUfR3pg",
        authDomain: "ictexam-1ebeb.firebaseapp.com",
        projectId: "ictexam-1ebeb",
        storageBucket: "ictexam-1ebeb.firebasestorage.app",
        messagingSenderId: "18694490334",
        appId: "1:18694490334:web:c5071b02bf72100a78da4f",
        measurementId: "G-76J5VR50NS"
      };

      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      appId = 'ictexam-app'; 
    } catch (error) { console.error("Firebase init error:", error); }

    // --- Global State ---
    let studentsData = [];
    let questions = [];
    let results = [];
    let teachersData = []; 
    
    let firebaseUser = null;
    let currentUser = null; 
    let userRole = null;    
    let loadingData = true;
    let errorMsg = '';
    let loginType = 'student';

    // Student State
    let selectedMonth = '';
    let selectedTeacherId = '';
    let quizStarted = false;
    let quizSubmitted = false;
    let currentAnswers = {};
    let currentScore = { got: 0, total: 0, needsGrading: false };
    let availableQuestions = [];
    let studentTab = 'exams'; 
    let currentQuizIsLesson = false;
    
    // Timer State
    let internetTime = new Date();
    let currentMonthName = '';
    let timeLeft = 0;
    let timerInterval = null;
    let quizStartTimestamp = null;
    const QUIZ_DURATION = 60 * 60; 

    // Teacher State
    let activeTab = 'add_questions';
    let repClass = 'All';
    let repMonth = 'All';
    let mqClass = 'All'; 
    let mqMonth = 'All'; 
    let editingQuestionId = null;
    let gradingResultId = null; 
    
    let isStudentModalOpen = false;
    let editingStudentData = null;
    let isChangePassModalOpen = false;
    let isTeacherPassModalOpen = false;

    let classes = ["7", "8", "9", "10", "11", "12"];
    const months = ["តេស្តដើមឆ្នាំ", "មករា", "កុម្ភៈ", "មីនា", "មេសា", "ឧសភា", "មិថុនា", "កក្កដា", "សីហា", "កញ្ញា", "តុលា", "វិច្ឆិកា", "ធ្នូ", "ឆមាស១", "ឆមាស២"];
    const standardMonths = ["មករា", "កុម្ភៈ", "មីនា", "មេសា", "ឧសភា", "មិថុនា", "កក្កដា", "សីហា", "កញ្ញា", "តុលា", "វិច្ឆិកា", "ធ្នូ"];

    async function fetchInternetTime() {
      try {
        const res = await fetch('https://worldtimeapi.org/api/timezone/Asia/Phnom_Penh');
        if (!res.ok) throw new Error('Network response was not ok');
        const data = await res.json();
        internetTime = new Date(data.datetime);
      } catch (e) {
        internetTime = new Date();
      }
      currentMonthName = standardMonths[internetTime.getMonth()]; 
    }

    const parseCSV = (text) => {
      const lines = text.split(/\r?\n/);
      if (lines.length < 2) return [];

      const parseCSVLine = (line) => {
        const result = [];
        let currentField = '';
        let insideQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          if (char === '"' && line[i+1] === '"') {
            currentField += '"'; i++; 
          } else if (char === '"') {
            insideQuotes = !insideQuotes;
          } else if (char === ',' && !insideQuotes) {
            result.push(currentField); currentField = '';
          } else {
            currentField += char;
          }
        }
        result.push(currentField);
        return result.map(f => f.trim());
      };

      const headers = parseCSVLine(lines[0]);
      const data = [];
      for (let i = 1; i < lines.length; i++) {
        if (lines[i].trim() === '') continue; 
        const currentLine = parseCSVLine(lines[i]);
        if (currentLine.length === headers.length) {
          const obj = {};
          headers.forEach((header, index) => {
            obj[header] = currentLine[index];
          });
          data.push(obj);
        }
      }
      return data;
    };

    async function initApp() {
      renderApp(); 
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (err) { console.error("Auth Error:", err); }

      onAuthStateChanged(auth, (user) => {
        firebaseUser = user;
        if (user) loadFirestoreData();
      });
    }

    function loadFirestoreData() {
      const qCollection = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
      onSnapshot(query(qCollection), (snapshot) => {
        questions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        if (userRole) renderApp();
      });

      const rCollection = collection(db, 'artifacts', appId, 'public', 'data', 'results');
      onSnapshot(query(rCollection), (snapshot) => {
        results = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        if (userRole) renderApp();
      });

      const sCollection = collection(db, 'artifacts', appId, 'public', 'data', 'students');
      onSnapshot(query(sCollection), (snapshot) => {
        studentsData = snapshot.docs.map(doc => doc.data());
        
        const uniqueClasses = new Set();
        studentsData.forEach(student => {
          if (student.CLASS) uniqueClasses.add(student.CLASS.trim());
        });
        if (uniqueClasses.size > 0) {
          classes = Array.from(uniqueClasses).sort((a, b) => {
            const numA = parseInt(a.replace(/[^0-9]/g, ''));
            const numB = parseInt(b.replace(/[^0-9]/g, ''));
            if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
            return a.localeCompare(b);
          });
        }
        loadingData = false;
        renderApp();
      });

      const tCollection = collection(db, 'artifacts', appId, 'public', 'data', 'teachers');
      onSnapshot(query(tCollection), (snapshot) => {
        teachersData = snapshot.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
        if (userRole) renderApp();
      });
    }

    window.setLoginType = (type) => { loginType = type; errorMsg = ''; renderApp(); };

    window.togglePassword = (inputId, iconEl) => {
        const input = document.getElementById(inputId);
        if(input.type === 'password') {
            input.type = 'text';
            iconEl.classList.remove('fa-eye');
            iconEl.classList.add('fa-eye-slash');
            iconEl.classList.add('text-blue-500');
        } else {
            input.type = 'password';
            iconEl.classList.remove('fa-eye-slash');
            iconEl.classList.remove('text-blue-500');
            iconEl.classList.add('fa-eye');
        }
    };

    window.handleLogin = async (e) => {
      e.preventDefault();
      const idInput = document.getElementById('loginId').value.trim().toUpperCase();
      const passInput = document.getElementById('loginPass').value.trim();
      errorMsg = '';

      const btn = e.target.querySelector('button[type="submit"]');
      const originalText = btn.innerHTML;
      btn.innerHTML = 'កំពុងផ្ទៀងផ្ទាត់...'; btn.disabled = true;

      if (loginType === 'student') {
        const student = studentsData.find(s => {
          if (!s.ID) return false;
          const matchID = s.ID.toString().trim().toUpperCase() === idInput;
          const actualPass = (s.PASSWORD !== undefined && s.PASSWORD !== null && s.PASSWORD !== '') ? s.PASSWORD.toString().trim() : (s.YYYY ? s.YYYY.toString().trim() : '');
          return matchID && actualPass === passInput;
        });
        
        if (student) {
          userRole = 'student'; currentUser = student; quizStarted = false; quizSubmitted = false; selectedMonth = ''; selectedTeacherId = '';
          await fetchInternetTime();
          renderApp();
        } else {
          errorMsg = 'ID ឬ ពាក្យសម្ងាត់មិនត្រឹមត្រូវ!'; btn.innerHTML = originalText; btn.disabled = false; renderApp();
        }
      } else if (loginType === 'teacher') {
        try {
          const userCredential = await signInWithEmailAndPassword(auth, idInput.toLowerCase(), passInput);
          userRole = 'teacher'; 
          currentUser = { email: userCredential.user.email };
          renderApp();
        } catch (error) {
          errorMsg = 'អ៊ីមែល ឬ លេខសម្ងាត់មិនត្រឹមត្រូវ!'; btn.innerHTML = originalText; btn.disabled = false; renderApp();
        }
      }
    };

    window.logout = async () => {
      if (userRole === 'teacher') {
        await signOut(auth); signInAnonymously(auth).catch(console.error); 
      }
      if (timerInterval) clearInterval(timerInterval); 
      userRole = null; currentUser = null; loginType = 'student'; renderApp();
    };

    function updateTimerUI() {
      const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
      const s = (timeLeft % 60).toString().padStart(2, '0');
      const el = document.getElementById('quiz-timer');
      if (el) {
        el.innerHTML = `<i class="fas fa-clock"></i> ម៉ោងនៅសល់: ${m}:${s}`;
        if (timeLeft < 300) el.classList.add('animate-pulse', 'bg-red-700'); 
      }
    }

    function startTimerCountdown() {
      if (timerInterval) clearInterval(timerInterval);
      updateTimerUI(); 
      timerInterval = setInterval(() => {
        timeLeft--; updateTimerUI();
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          alert("ម៉ោងប្រឡងរបស់អ្នកបានបញ្ចប់! ចម្លើយកំពុងត្រូវបានបញ្ជូនដោយស្វ័យប្រវត្តិ។");
          window.submitQuiz(true); 
        }
      }, 1000);
    }

    window.setStudentTab = (tab) => {
      studentTab = tab;
      renderApp();
    };

    window.startExam = async (tId, month, isLesson = false) => {
      selectedTeacherId = tId;
      selectedMonth = month;
      currentQuizIsLesson = isLesson;

      let validQuestions = questions.filter(q => {
        const qClasses = Array.isArray(q.classLevel) ? q.classLevel : [q.classLevel];
        const matchTeacher = q.teacherId === tId || (tId === 'legacy' && !q.teacherId);
        const matchType = isLesson ? q.type === 'lesson' : q.type !== 'lesson';
        return qClasses.includes(currentUser.CLASS) && q.month === selectedMonth && q.status === 'online' && matchTeacher && matchType;
      });

      if (validQuestions.length === 0) { alert(isLesson ? 'មិនមានមេរៀនទេ!' : 'មិនមានសំណួរសម្រាប់វិញ្ញាសានេះទេ!'); return; }

      if (isLesson) {
         let displayQs = [...validQuestions];
         displayQs.sort((a, b) => {
            if(a.displayMode === 'random' && b.displayMode === 'random') return Math.random() - 0.5;
            return 0; 
         });
         availableQuestions = displayQs;
         quizStarted = true;
         quizSubmitted = false;
         renderApp();
         return; 
      }
      
      const questionSessionKey = `quiz_questions_${currentUser.ID}_${selectedTeacherId}_${selectedMonth}`;
      const optionSessionKey = `quiz_options_${currentUser.ID}_${selectedTeacherId}_${selectedMonth}`;
      
      let savedQuestionIds = localStorage.getItem(questionSessionKey);
      
      if (savedQuestionIds) {
        const idsArray = JSON.parse(savedQuestionIds);
        availableQuestions = idsArray.map(id => validQuestions.find(q => q.id === id)).filter(Boolean);
        if (availableQuestions.length === 0) savedQuestionIds = null; 
        
        // Restore order map for multiple choices
        const savedOrderMap = localStorage.getItem(optionSessionKey);
        if(savedOrderMap) {
            const parsedOrderMap = JSON.parse(savedOrderMap);
            availableQuestions.forEach(q => {
                if(q.type.includes('multiple_choice') && q.options && parsedOrderMap[q.id]) {
                    q.originalOrder = parsedOrderMap[q.id];
                    q.shuffledOptions = parsedOrderMap[q.id].map(idx => q.options[idx]);
                }
            });
        }
      }
      
      if (!savedQuestionIds) {
        // Triage questions into Fixed and Random
        let fixedQs = validQuestions.filter(q => q.displayMode === 'fixed' || !q.displayMode);
        let randomQs = validQuestions.filter(q => q.displayMode === 'random');
        
        // Shuffle random questions pool
        randomQs.sort(() => Math.random() - 0.5);
        
        let currentTotal = 0;
        let selectedQs = [];
        let selectedIds = [];
        let orderMap = {};
        
        // 1. Add all Fixed Questions first
        for (const q of fixedQs) {
            selectedQs.push(q);
            selectedIds.push(q.id);
            if (q.type !== 'lesson') {
                currentTotal += Number(q.points) || 0;
            }
        }
        
        // 2. Add Random Questions until 50 points (or any target). Assuming 50 is full score.
        for (const q of randomQs) {
            if (q.type === 'lesson') {
                selectedQs.push(q);
                selectedIds.push(q.id);
            } else {
                let pts = Number(q.points) || 0;
                if (currentTotal + pts <= 50) {
                    selectedQs.push(q);
                    selectedIds.push(q.id);
                    currentTotal += pts;
                }
            }
        }
        
        // Optional: Shuffle the final combined list so fixed and random are mixed
        selectedQs.sort(() => Math.random() - 0.5);
        
        // Prepare options shuffling
        for (const q of selectedQs) {
            if (q.type && q.type.includes('multiple_choice') && q.options) {
                let order = q.options.map((_, i) => i);
                for (let i = order.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [order[i], order[j]] = [order[j], order[i]];
                }
                orderMap[q.id] = order;
                q.originalOrder = order;
                q.shuffledOptions = order.map(idx => q.options[idx]);
            }
        }

        availableQuestions = selectedQs;
        
        if (availableQuestions.filter(q => q.type !== 'lesson').length === 0) {
          alert('សំណួរមានបញ្ហា (មិនមានសំណួរសម្រាប់យកពិន្ទុ) សូមទាក់ទងគ្រូ!'); 
          return; 
        }
        
        localStorage.setItem(questionSessionKey, JSON.stringify(selectedQs.map(q => q.id)));
        localStorage.setItem(optionSessionKey, JSON.stringify(orderMap));
      }

      await fetchInternetTime();
      const sessionKey = `quiz_time_${currentUser.ID}_${selectedTeacherId}_${selectedMonth}`;
      let savedStartTime = localStorage.getItem(sessionKey);
      
      if (!savedStartTime) {
        savedStartTime = internetTime.getTime(); localStorage.setItem(sessionKey, savedStartTime);
      }
      
      quizStartTimestamp = parseInt(savedStartTime);
      const elapsedSeconds = Math.floor((internetTime.getTime() - quizStartTimestamp) / 1000);
      timeLeft = Math.max(0, QUIZ_DURATION - elapsedSeconds);

      if (timeLeft <= 0) { alert("ម៉ោងប្រឡងសម្រាប់វិញ្ញាសានេះបានផុតកំណត់ហើយ!"); window.submitQuiz(true); return; }

      quizStarted = true;
      const ansSessionKey = `quiz_answers_${currentUser.ID}_${selectedTeacherId}_${selectedMonth}`;
      const savedAns = localStorage.getItem(ansSessionKey);
      currentAnswers = savedAns ? JSON.parse(savedAns) : {};
      quizSubmitted = false;
      renderApp(); startTimerCountdown();
    };

    // Handler for Single Choice and Essay
    window.selectAnswer = (qId, val) => {
      currentAnswers[qId] = val;
      localStorage.setItem(`quiz_answers_${currentUser.ID}_${selectedTeacherId}_${selectedMonth}`, JSON.stringify(currentAnswers));
      if(typeof val === 'number' || typeof val === 'string' && !isNaN(val) && val !== '') {
        document.querySelectorAll(`.opt-container-${qId}`).forEach(el => el.classList.remove('option-checked', 'bg-blue-100', 'border-blue-500'));
        const selEl = document.getElementById(`lbl-${qId}-${val}`);
        if(selEl) selEl.classList.add('option-checked', 'bg-blue-100', 'border-blue-500');
      }
    };

    // Handler for Multiple Correct Choices (Checkboxes)
    window.selectAnswerMulti = (qId, val, isChecked) => {
      if (!currentAnswers[qId]) currentAnswers[qId] = [];
      
      if (isChecked) {
        if (!currentAnswers[qId].includes(val)) currentAnswers[qId].push(val);
      } else {
        currentAnswers[qId] = currentAnswers[qId].filter(v => v !== val);
      }
      localStorage.setItem(`quiz_answers_${currentUser.ID}_${selectedTeacherId}_${selectedMonth}`, JSON.stringify(currentAnswers));
      
      const selEl = document.getElementById(`lbl-${qId}-${val}`);
      if(selEl) {
          if(isChecked) selEl.classList.add('option-checked', 'bg-blue-100', 'border-blue-500');
          else selEl.classList.remove('option-checked', 'bg-blue-100', 'border-blue-500');
      }
    };

    window.submitQuiz = async (isAutoSubmit = false) => {
      const unanswered = availableQuestions.some(q => {
        if (q.type === 'lesson') return false; // Ignore lessons for completion check
        
        if (currentAnswers[q.id] === undefined || currentAnswers[q.id] === null) return true;
        if (q.type === 'essay' && String(currentAnswers[q.id]).trim() === '') return true;
        if (q.type === 'multiple_choice_multi' && (!Array.isArray(currentAnswers[q.id]) || currentAnswers[q.id].length === 0)) return true;
        
        return false;
      });

      if (!isAutoSubmit && unanswered) {
        if (!confirm('អ្នកមិនទាន់ឆ្លើយគ្រប់សំណួរទេ។ តើចង់បញ្ជូនឬទេ?')) return;
      }

      if (timerInterval) clearInterval(timerInterval);
      
      let gotScore = 0; let totalPts = 0; let hasEssay = false;
      let questionScores = {};
      let originalAnswers = {};

      availableQuestions.forEach(q => {
        if (q.type === 'lesson') return; // Exclude from scoring completely
        
        totalPts += Number(q.points);
        
        if (q.type === 'essay') {
          hasEssay = true;
          questionScores[q.id] = 0; 
          originalAnswers[q.id] = currentAnswers[q.id] || '';
        } else if (q.type === 'multiple_choice_multi') {
          let studentArr = currentAnswers[q.id] || [];
          let originalAnswerIndices = studentArr.map(v => q.originalOrder ? q.originalOrder[Number(v)] : Number(v));
          originalAnswers[q.id] = originalAnswerIndices; // store array of original indices
          
          let realCorrectAnswers = Array.isArray(q.correctAnswer) ? q.correctAnswer : [];
          // Check if arrays have exact same elements
          let isCorrect = originalAnswerIndices.length === realCorrectAnswers.length && 
                          originalAnswerIndices.every(val => realCorrectAnswers.includes(val));
          
          if (isCorrect) {
            gotScore += Number(q.points);
            questionScores[q.id] = Number(q.points);
          } else {
            questionScores[q.id] = 0;
          }
        } else { // multiple_choice_single
          let studentShuffledAnswer = currentAnswers[q.id];
          let originalAnswerIndex = null;
          
          if (studentShuffledAnswer !== undefined && studentShuffledAnswer !== null && studentShuffledAnswer !== '') {
             originalAnswerIndex = q.originalOrder ? q.originalOrder[Number(studentShuffledAnswer)] : Number(studentShuffledAnswer);
          }
          originalAnswers[q.id] = originalAnswerIndex;

          let realCorrectAnswer = q.correctAnswer;
          
          if (originalAnswerIndex == realCorrectAnswer) {
            gotScore += Number(q.points);
            questionScores[q.id] = Number(q.points);
          } else {
            questionScores[q.id] = 0;
          }
        }
      });

      currentScore = { got: gotScore, total: totalPts, needsGrading: hasEssay };
      
      let tSubj = 'ទូទៅ';
      if (selectedTeacherId !== 'legacy') {

    window.syncStudents = async () => {
      const url = document.getElementById('sheetUrl').value.trim();
      if(!url) return alert("សូមបញ្ចូលតំណភ្ជាប់ Google Sheet CSV!");
      
      const btn = document.getElementById('btnSync');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> កំពុងទាញយក...'; 
      btn.disabled = true;

      try {
        const res = await fetch(url);
        const text = await res.text();
        const parsed = parseCSV(text);
        if(parsed.length === 0) throw new Error("គ្មានទិន្នន័យក្នុង Sheet");
        
        let validCount = 0; let duplicateCount = 0; let missingIdCount = 0;
        const seenIds = new Set(); const batchPromises = [];

        parsed.forEach(s => {
          if(!s.ID || s.ID.toString().trim() === '') { missingIdCount++; return; }
          const cleanID = s.ID.toString().trim().toUpperCase();
          if(seenIds.has(cleanID)) { duplicateCount++; return; }
          seenIds.add(cleanID); validCount++;

          const cleanYYYY = (s.YYYY || '').toString().trim();
          const cleanClass = (s.CLASS || '').toString().trim();
          const existingStudent = studentsData.find(st => st.ID === cleanID);
          const currentPassword = existingStudent && existingStudent.PASSWORD ? existingStudent.PASSWORD : cleanYYYY;
          
          const sRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', cleanID);
          batchPromises.push(setDoc(sRef, {
            ...s, ID: cleanID, YYYY: cleanYYYY, CLASS: cleanClass, PASSWORD: currentPassword, updatedAt: serverTimestamp()
          }, { merge: true }));
        });

        await Promise.all(batchPromises);
        let msg = `ទាញយក និងរក្សាទុកទិន្នន័យសិស្សបានចំនួន ${validCount} នាក់ជោគជ័យ!`;
        if (duplicateCount > 0) msg += `\n\n⚠️ រកឃើញអត្តលេខ (ID) ជាន់គ្នា ចំនួន ${duplicateCount} នាក់។`;
        if (missingIdCount > 0) msg += `\n⚠️ រកឃើញជួរទទេរ ចំនួន ${missingIdCount} ជួរ។`;
        alert(msg);
      } catch(err) {
        alert("មានបញ្ហាក្នុងការទាញយកទិន្នន័យសិស្ស។ សូមពិនិត្យមើលតំណភ្ជាប់ម្តងទៀត។");
      } finally {
        btn.innerHTML = '<i class="fas fa-cloud-download-alt mr-2"></i> ទាញយកទិន្នន័យចូលប្រព័ន្ធ'; btn.disabled = false;
      }

    window.saveExcelTable = async () => {
      const rows = document.querySelectorAll('.excel-row');
      if(rows.length === 0) return;
      const btn = document.getElementById('btnSaveExcel');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> កំពុងរក្សាទុក...'; btn.disabled = true;

      const batchPromises = [];
      let validCount = 0;
      const myProfile = teachersData.find(t => t.uid === firebaseUser.uid) || {};

      for(let tr of rows) {
        const txt = tr.querySelector('.eq-text').value.trim();
        if(!txt) continue; 
        const clsStr = tr.querySelector('.eq-class').value;
        const cls = clsStr.split(',').map(c => c.trim()).filter(c => c);
        if(cls.length === 0) { alert('មានសំណួរដែលមិនទាន់បានបញ្ជាក់ថ្នាក់ទី (សូមមើលក្នុងតារាង)!'); btn.innerHTML = originalText; btn.disabled = false; return; }

        const typ = tr.querySelector('.eq-type').value;
        let opts = []; let corr = null;
        if(typ.includes('multiple_choice')) {
          opts = [tr.querySelector('.eq-opta').value, tr.querySelector('.eq-optb').value, tr.querySelector('.eq-optc').value, tr.querySelector('.eq-optd').value];
          corr = Number(tr.querySelector('.eq-correct').value);
        }

          teacherId: firebaseUser.uid, teacherName: myProfile.name || '', subject: myProfile.subject || '',
          classLevel: cls, month: tr.querySelector('.eq-month').value, type: typ,
          displayMode: tr.querySelector('.eq-display').value,
          points: typ === 'lesson' ? 0 : (Number(tr.querySelector('.eq-points').value) || 10), 
          text: txt, options: opts, correctAnswer: corr,

                     </div>
                     <div class="flex justify-end gap-3 mt-6 pt-5 border-t border-gray-200">
                       <button type="button" onclick="window.closeStudentModal()" class="px-6 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition">បោះបង់</button>
                       <button type="submit" class="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition shadow-md flex items-center gap-2"><i class="fas fa-save"></i> រក្សាទុក</button>
                     </div>
                   </form>
                 </div>
               </div>
             </div>
           `;
        }
      }

      const myProfile = teachersData.find(t => t.uid === firebaseUser.uid) || {};

      return `
        <div class="max-w-6xl mx-auto mt-4 sm:mt-8 flex flex-col lg:flex-row gap-6">
          <div class="w-full lg:w-72 bg-white p-5 rounded-2xl shadow-sm border border-gray-100 h-fit lg:sticky lg:top-24">
            <div class="flex items-center gap-3 mb-6 pb-4 border-b">
              <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-xl"><i class="fas fa-user-shield"></i></div>
              <div class="flex-1 overflow-hidden">
                <h2 class="text-gray-800 font-moul truncate" title="${myProfile.name || 'គណនីគ្រូ'}">${myProfile.name || 'គណនីគ្រូ'}</h2>
                <p class="text-xs text-blue-600 font-bold truncate">${myProfile.subject || 'មិនទាន់កំណត់មុខវិជ្ជា'}</p>
                <p class="text-xs text-gray-500 truncate" title="${firebaseUser.email}">${firebaseUser.email}</p>
              </div>
            </div>
            
            <nav class="space-y-1.5">
              <button onclick="window.setTeacherTab('add_questions')" class="w-full flex items-center gap-3 text-left p-3.5 rounded-xl font-bold transition text-sm ${activeTab === 'add_questions' ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-50'}">
                <i class="fas fa-plus-circle w-5 text-center text-lg"></i> បញ្ចូល១ៗ (មានរូប)
              </button>
              <button onclick="window.setTeacherTab('add_questions_table')" class="w-full flex items-center gap-3 text-left p-3.5 rounded-xl font-bold transition text-sm ${activeTab === 'add_questions_table' ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-50'}">
                <i class="fas fa-table w-5 text-center text-lg"></i> បញ្ចូលជាតារាង (Excel)
              </button>
              <button onclick="window.setTeacherTab('manage_q')" class="w-full flex items-center gap-3 text-left p-3.5 rounded-xl font-bold transition text-sm ${activeTab === 'manage_q' ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-50'}">
                <i class="fas fa-folder w-5 text-center text-lg"></i> គ្រប់គ្រងសំណួរ
              </button>
              <button onclick="window.setTeacherTab('reports')" class="w-full flex items-center gap-3 text-left p-3.5 rounded-xl font-bold transition text-sm ${activeTab === 'reports' || activeTab === 'grading_view' ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-50'}">
                <i class="fas fa-clipboard-list w-5 text-center text-lg"></i> របាយការណ៍/កែពិន្ទុ
              </button>
              <div class="border-t my-2 pt-2"></div>
              <button onclick="window.setTeacherTab('settings')" class="w-full flex items-center gap-3 text-left p-3.5 rounded-xl font-bold transition text-sm ${activeTab === 'settings' || activeTab === 'manage_students' ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-50'}">
                <i class="fas fa-users-cog w-5 text-center text-lg"></i> កំណត់គណនី & សិស្ស
              </button>
            </nav>
          </div>
          <div class="flex-1 bg-white p-6 sm:p-8 rounded-2xl shadow-sm border border-gray-100 min-h-[500px]">
            ${rightPanelHtml}
          </div>
        </div>
        <style> .mask-bottom { mask-image: linear-gradient(to bottom, black 50%, transparent 100%); } </style>
      `;
    }

    function renderApp() {
      renderHeader();
      const container = document.getElementById('app-container');
      
      if (!userRole) {
        container.innerHTML = renderLogin();
      } else if (userRole === 'student') {
        container.innerHTML = renderStudent();
      } else if (userRole === 'teacher') {
        container.innerHTML = renderTeacher();
        
        if (activeTab === 'add_questions') {
          setTimeout(() => {
            if (document.getElementById('qText') && !window.quill) {
              window.quill = new Quill('#qText', {
                theme: 'snow',
                modules: { formula: true, toolbar: '#quill-toolbar' },
                placeholder: 'វាយបញ្ចូល ឬបិទភ្ជាប់សំណួរនៅទីនេះ...'
              });
            } else if (document.getElementById('qText') && window.quill) {
              window.quill = new Quill('#qText', {
                theme: 'snow',
                modules: { formula: true, toolbar: '#quill-toolbar' },
                placeholder: 'វាយបញ្ចូល ឬបិទភ្ជាប់សំណួរនៅទីនេះ...'
              });
            }
            if(document.getElementById('qType')) window.toggleQType(document.getElementById('qType').value);
          }, 50);
        } else if (activeTab === 'add_questions_table') {
          setTimeout(() => {
            const tbody = document.getElementById('excel-tbody');
            if(tbody && tbody.children.length === 0) {
              window.addExcelRow(); window.addExcelRow(); window.addExcelRow();
            }
          }, 50);
        }
      }
    }

    initApp();
  </script>
</body>
</html>
